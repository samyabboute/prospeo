<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recurring Invoices — Prospeo</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="prospeo-animations.css">
  <script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#003399;--brand-light:#EEF2FF;--bg:#F8FAFF;--white:#fff;--text:#0D1117;--text2:#6B7280;--border:#E5E7EB;--success:#059669;--r:12px;--ease:cubic-bezier(.25,.46,.45,.94)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;animation:fadeIn .3s var(--ease)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.topbar{background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100}
.topbar img{height:22px}
.back{font-size:13px;color:var(--brand);text-decoration:none;margin-left:auto}
.content{max-width:900px;margin:0 auto;padding:28px 24px}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-title{font-size:26px;font-weight:700;letter-spacing:-.5px}
.page-sub{font-size:14px;color:var(--text2);margin-top:4px}
.btn{padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 2px 8px rgba(0,51,153,.2)}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:#F3F4F6}
.btn-danger{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
.btn-danger:hover{background:#FEE2E2}
.empty{text-align:center;padding:80px 24px;color:var(--text2)}
.empty-icon{font-size:52px;margin-bottom:16px}
.empty-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px}
.empty-sub{font-size:14px;margin-bottom:24px}
.recurring-grid{display:grid;gap:12px}
.rec-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;transition:transform .2s var(--ease),box-shadow .2s var(--ease)}
.rec-card:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.06)}
.rec-card.inactive{opacity:.55}
.rec-icon{width:42px;height:42px;border-radius:10px;background:#EEF2FF;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.rec-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:2px}
.rec-meta{font-size:12px;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
.rec-amount{font-size:18px;font-weight:700;color:var(--text);text-align:right}
.rec-freq{font-size:11px;color:var(--text2);text-align:right;margin-bottom:6px}
.rec-actions{display:flex;gap:6px;margin-top:6px;justify-content:flex-end}
.freq-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--brand-light);color:var(--brand);font-weight:600}
.pro-gate{background:#FFF7ED;border:1px solid #FED7AA;border-radius:var(--r);padding:32px;text-align:center}
.pro-gate-icon{font-size:36px;margin-bottom:12px}
.pro-gate-title{font-size:18px;font-weight:700;color:#92400E;margin-bottom:8px}
.pro-gate-sub{font-size:14px;color:#B45309;margin-bottom:20px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(6px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:16px;padding:28px;width:480px;max-width:calc(100vw - 32px);transform:translateY(12px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block}
.form-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;color:var(--text);font-family:inherit;background:var(--white);transition:border-color .15s}
.form-input:focus{outline:none;border-color:var(--brand)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
.toggle-label{font-size:13px;color:var(--text);font-weight:500}
.toggle-sub{font-size:11px;color:var(--text2)}
.switch{position:relative;width:42px;height:24px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch-track{position:absolute;cursor:pointer;inset:0;background:#D1D5DB;border-radius:24px;transition:.2s}
.switch input:checked+.switch-track{background:var(--brand)}
.switch-track::before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked+.switch-track::before{transform:translateX(18px)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0D1117;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:9999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast-success{background:var(--success)}

  
  /* Mobile bottom nav */
  .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--bg-raised,#fff);border-top:1px solid var(--border,#E5E7EB);z-index:500;padding:0 4px calc(env(safe-area-inset-bottom,0px))}
  .bottom-nav-row{display:flex;height:100%;align-items:stretch}
  .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;color:#9CA3AF;border:none;background:none;cursor:pointer;font-family:inherit;padding:6px 2px;-webkit-tap-highlight-color:transparent;transition:color .12s;position:relative}
  .bn-item.active{color:#003399}
  .bn-item svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round}
  .bn-item span{font-size:9px;font-weight:600;letter-spacing:.01em;line-height:1}
  .bn-item.active::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:2px;background:#003399;border-radius:0 0 2px 2px}
  @media(max-width:768px){.bottom-nav{display:flex}body{padding-bottom:68px}}
</style>
</head>
<body>
<div class="topbar">
  <img src="prospeo-logo.svg" alt="Prospeo">
  <a class="back" href="invoices.html">&#8592; Invoices</a>
</div>
<div class="content">
  <div class="page-head">
    <div>
      <div class="page-title anim-fade-up">Recurring Invoices</div>
      <div class="page-sub anim-fade-up delay-100">Auto-generate invoices for your regular clients. Set it once, get paid every month.</div>
    </div>
    <button class="btn btn-primary anim-fade-up delay-200" onclick="openModal()">&#43; New recurring invoice</button>
  </div>
  <div id="main-content"><div class="empty"><div style="font-size:32px">&#8987;</div><br>Loading...</div></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">New Recurring Invoice</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Invoice title *</label>
        <input class="form-input" id="rec-title" placeholder="e.g. Monthly retainer">
      </div>
      <div class="form-group">
        <label class="form-label">Client</label>
        <select class="form-input" id="rec-client"><option value="">Select client...</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Amount HT (€) *</label>
        <input class="form-input" id="rec-amount" type="number" min="0" step="0.01" placeholder="1000.00">
      </div>
      <div class="form-group">
        <label class="form-label">TVA rate (%)</label>
        <select class="form-input" id="rec-tva">
          <option value="0">0% (exonéré)</option>
          <option value="5.5">5.5%</option>
          <option value="10">10%</option>
          <option value="20" selected>20%</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Frequency</label>
        <select class="form-input" id="rec-freq">
          <option value="monthly">Monthly</option>
          <option value="quarterly">Quarterly</option>
          <option value="yearly">Yearly</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Day of month</label>
        <select class="form-input" id="rec-day">
          <option value="1">1st</option>
          <option value="5">5th</option>
          <option value="15">15th</option>
          <option value="28">28th (last safe)</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Description (optional)</label>
      <input class="form-input" id="rec-desc" placeholder="e.g. Monthly SEO consulting retainer">
    </div>
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Auto-send to client</div>
        <div class="toggle-sub">Automatically email the invoice on the scheduled date</div>
      </div>
      <label class="switch"><input type="checkbox" id="rec-autosend"><span class="switch-track"></span></label>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRecurring()">Save</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="prospeo-animations.js"></script>
<script>
var _supa = supabase.createClient(SUPA_URL, SUPA_KEY);
var _uid=null, _recs=[], _clients=[], _editId=null;
function sanitize(s){var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}
function formatEUR(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0);}
function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'toast-success')+' show';setTimeout(function(){t.className='toast';},3000);}

(async function(){
  var s=await _supa.auth.getSession();
  if(!s.data.session){window.location.href='login.html';return;}
  _uid=s.data.session.user.id;

  // Check pro plan
  var {data:sub}=await _supa.from('subscriptions').select('plan,status').eq('user_id',_uid).single();
  var isPro=sub&&sub.plan==='pro'&&sub.status==='active';
  if(!isPro){
    document.getElementById('main-content').innerHTML=
      '<div class="pro-gate">' +
        '<div class="pro-gate-icon">&#128196;</div>' +
        '<div class="pro-gate-title">Recurring invoices is a Pro feature</div>' +
        '<div class="pro-gate-sub">Set up automatic monthly invoices for your retainer clients. Never forget to invoice again.</div>' +
        '<a href="pricing.html" style="display:inline-flex;align-items:center;gap:8px;background:var(--brand);color:#fff;padding:12px 24px;border-radius:var(--r);font-size:14px;font-weight:600;text-decoration:none">Upgrade to Pro &#8594;</a>' +
      '</div>';
    return;
  }

  // Load clients for dropdown
  var {data:clients}=await _supa.from('clients').select('id,name').eq('user_id',_uid).order('name');
  _clients=clients||[];
  var sel=document.getElementById('rec-client');
  _clients.forEach(function(c){
    var opt=document.createElement('option');opt.value=c.id;opt.textContent=c.name;sel.appendChild(opt);
  });

  await loadRecs();
  Animate.initPageLoad();
})();

async function loadRecs(){
  var {data}=await _supa.from('recurring_invoices').select('*,clients(name)').eq('user_id',_uid).order('next_date');
  _recs=data||[];
  renderRecs();
}

function renderRecs(){
  var el=document.getElementById('main-content');
  if(!_recs.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">&#128197;</div><div class="empty-title">No recurring invoices yet</div><div class="empty-sub">Set up your first recurring invoice and never forget to bill a retainer client again.</div><button class="btn btn-primary" onclick="openModal()">&#43; Create first recurring invoice</button></div>';
    return;
  }
  var freqLabel={monthly:'Every month',quarterly:'Every 3 months',yearly:'Every year'};
  el.innerHTML='<div class="recurring-grid">' + _recs.map(function(r){
    var amtTTC=r.amount_ht*(1+(r.tva_rate||20)/100);
    var clientName=(r.clients&&r.clients.name)||'No client';
    var nextDate=r.next_date?new Date(r.next_date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}):'—';
    return '<div class="rec-card anim-fade-up' + (r.is_active?'':' inactive') + '">' +
      '<div class="rec-icon">&#128197;</div>' +
      '<div>' +
        '<div class="rec-name">' + sanitize(r.title) + '</div>' +
        '<div class="rec-meta">' +
          '<span>&#128101; ' + sanitize(clientName) + '</span>' +
          '<span class="freq-badge">' + (freqLabel[r.frequency]||r.frequency) + '</span>' +
          '<span>&#128197; Next: ' + nextDate + '</span>' +
          (r.auto_send?'<span style="color:var(--success)">&#10003; Auto-send on</span>':'') +
        '</div>' +
      '</div>' +
      '<div>' +
        '<div class="rec-amount">' + formatEUR(amtTTC) + '</div>' +
        '<div class="rec-freq">TTC / ' + r.frequency.replace('ly','') + '</div>' +
        '<div class="rec-actions">' +
          '<button class="btn btn-ghost" style="padding:5px 10px;font-size:11px" onclick="editRec(\'' + r.id + '\')">Edit</button>' +
          '<button class="btn ' + (r.is_active?'btn-danger':'btn-ghost') + '" style="padding:5px 10px;font-size:11px" onclick="toggleRec(\'' + r.id + '\',' + !r.is_active + ')">' + (r.is_active?'Pause':'Resume') + '</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('') + '</div>';
}

function openModal(){ _editId=null; document.getElementById('modal-title').textContent='New recurring invoice'; clearForm(); document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
function clearForm(){ ['rec-title','rec-amount','rec-desc'].forEach(function(id){document.getElementById(id).value='';}); document.getElementById('rec-client').value=''; document.getElementById('rec-tva').value='20'; document.getElementById('rec-freq').value='monthly'; document.getElementById('rec-day').value='1'; document.getElementById('rec-autosend').checked=false; }

function editRec(id){
  var r=_recs.find(function(x){return x.id===id;}); if(!r) return;
  _editId=id;
  document.getElementById('modal-title').textContent='Edit recurring invoice';
  document.getElementById('rec-title').value=r.title||'';
  document.getElementById('rec-client').value=r.client_id||'';
  document.getElementById('rec-amount').value=r.amount_ht||'';
  document.getElementById('rec-tva').value=String(r.tva_rate||20);
  document.getElementById('rec-freq').value=r.frequency||'monthly';
  document.getElementById('rec-day').value=String(r.day_of_month||1);
  document.getElementById('rec-desc').value=r.description||'';
  document.getElementById('rec-autosend').checked=r.auto_send||false;
  document.getElementById('modal').classList.add('open');
}

async function saveRecurring(){
  var title=(document.getElementById('rec-title').value||'').trim();
  var amtStr=(document.getElementById('rec-amount').value||'').trim();
  if(!title||!amtStr){toast('Please fill in title and amount','toast-error');return;}
  var amtHT=parseFloat(amtStr);
  if(isNaN(amtHT)||amtHT<0){toast('Invalid amount','toast-error');return;}
  var freq=document.getElementById('rec-freq').value;
  var day=parseInt(document.getElementById('rec-day').value,10);
  var now=new Date();
  var nextDate=new Date(now.getFullYear(), now.getMonth()+(freq==='monthly'?1:freq==='quarterly'?3:12), day);
  var rec={
    user_id:_uid, title:title, client_id:document.getElementById('rec-client').value||null,
    amount_ht:amtHT, tva_rate:parseFloat(document.getElementById('rec-tva').value)||20,
    frequency:freq, day_of_month:day, next_date:nextDate.toISOString().slice(0,10),
    description:document.getElementById('rec-desc').value||null,
    auto_send:document.getElementById('rec-autosend').checked, is_active:true, updated_at:new Date().toISOString()
  };
  try{
    if(_editId){ await _supa.from('recurring_invoices').update(rec).eq('id',_editId); }
    else { await _supa.from('recurring_invoices').insert(rec); }
    closeModal(); await loadRecs(); toast(_editId?'Recurring invoice updated':'Recurring invoice created');
  }catch(e){toast('Failed to save: '+(e.message||'unknown'),'toast-error');}
}

async function toggleRec(id, active){
  try{ await _supa.from('recurring_invoices').update({is_active:active,updated_at:new Date().toISOString()}).eq('id',id); await loadRecs(); toast(active?'Recurring invoice resumed':'Recurring invoice paused'); }
  catch(e){toast('Failed to update','toast-error');}
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
window.addEventListener('unhandledrejection',function(e){console.error('[Recurring]',e.reason);});
</script>

</body>
