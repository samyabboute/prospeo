<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clients — Prospeo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8FAFF;min-height:100vh}
  .topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-size:22px;font-weight:800;color:#003399;cursor:pointer}
  .logo span{color:#6366F1}
  .nav a{color:#6B7280;text-decoration:none;margin-left:24px;font-size:14px;font-weight:500}
  .nav a:hover{color:#003399}
  .content{max-width:1100px;margin:32px auto;padding:0 24px}
  h1{font-size:28px;font-weight:700;color:#0D1117;margin-bottom:24px}
  .card{background:#fff;border-radius:12px;border:1px solid #E5E7EB;padding:24px}
  .empty{text-align:center;padding:60px;color:#9CA3AF}
  .empty-icon{font-size:48px;margin-bottom:16px}
  .btn{background:#003399;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
  .btn:hover{opacity:.88}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:12px;font-weight:600;color:#6B7280;text-transform:uppercase;padding:12px 16px;border-bottom:2px solid #E5E7EB}
  td{padding:12px 16px;border-bottom:1px solid #F3F4F6;font-size:14px;color:#374151}
  tr:hover td{background:#F8FAFF}
  .avatar{width:32px;height:32px;border-radius:50%;background:#EEF2FF;color:#003399;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .loading{text-align:center;padding:40px;color:#9CA3AF}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo" onclick="window.location.href='app.html'">prospe<span>o</span></div>
  <div class="nav">
    <a href="app.html">Dashboard</a>
    <a href="clients.html">Clients</a>
    <a href="invoices.html">Invoices</a>
  </div>
</div>
<div class="content">
  <h1>Clients</h1>
  <div class="card">
    <div id="clients-body"><div class="loading">Loading clients...</div></div>
  </div>
</div>
<script>
var SUPA_URL = 'https://ferkzwzypmdtuypxribz.supabase.co';
var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlcmt6d3p5cG1kdHV5cHhyaWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjY4MjksImV4cCI6MjA4OTI0MjgyOX0.KbRa1t0VqrdURT0xbWLUXOZrf462wLNZaUgljk7h6eg';
var _supa = supabase.createClient(SUPA_URL, ANON_KEY);

(async function(){
  var s = await _supa.auth.getSession();
  if(!s.data.session){ window.location.href='login.html'; return; }
  var uid = s.data.session.user.id;
  var {data:clients,error} = await _supa.from('clients').select('*').eq('user_id',uid).order('created_at',{ascending:false});
  var el = document.getElementById('clients-body');
  if(error||!clients||clients.length===0){
    el.innerHTML='<div class="empty"><div class="empty-icon">👥</div><div>No clients yet. Add your first client from the dashboard.</div></div>';
    return;
  }
  var rows = clients.map(function(c){
    var initials = (c.name||'?').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);
    return '<tr><td><div style="display:flex;align-items:center;gap:12px"><div class="avatar">'+initials+'</div>'+sanitize(c.name)+'</div></td><td>'+sanitize(c.email||'—')+'</td><td>'+sanitize(c.company||'—')+'</td><td>'+sanitize(c.phone||'—')+'</td></tr>';
  }).join('');
  el.innerHTML='<table><thead><tr><th>Name</th><th>Email</th><th>Company</th><th>Phone</th></tr></thead><tbody>'+rows+'</tbody></table>';
})();
function sanitize(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

  // Global error handler - catches unhandled async errors
  window.addEventListener('unhandledrejection', function(e) {
    console.error('[Prospeo] Unhandled error:', e.reason);
    var t = document.getElementById('toast');
    if(t){ t.textContent='An error occurred. Please refresh the page.'; t.className='toast toast-error show'; setTimeout(function(){t.className='toast';},4000); }
  });
</script>
</body>
</html>
