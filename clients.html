<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.supabase.co https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co;">
<title>Clients — Prospeo</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script src="config.js"></script>
<script src="shell.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
/* ── PAGE-SPECIFIC STYLES ── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-title-row{display:flex;align-items:center;gap:10px}
.page-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.page-count{font-size:13px;color:var(--text4);background:var(--surface2);padding:2px 10px;border-radius:var(--rfull);font-weight:500}

.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.filter-btn{font-size:12px;font-weight:500;padding:5px 14px;border-radius:var(--rfull);border:1px solid var(--border);background:var(--surface);color:var(--text3);cursor:pointer;font-family:inherit;transition:all .15s}
.filter-btn:hover,.filter-btn.active{background:var(--brand-light);border-color:var(--brand-border);color:var(--brand)}
.view-toggle{display:flex;background:var(--surface2);border-radius:var(--r);padding:2px;margin-left:auto}
.view-btn{padding:5px 10px;border-radius:6px;border:none;background:none;cursor:pointer;color:var(--text4);font-family:inherit;transition:all .15s}
.view-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;display:block}
.view-btn.active{background:var(--surface);color:var(--brand);box-shadow:var(--shadow)}

.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.client-list{display:flex;flex-direction:column;gap:8px}
.client-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:18px;cursor:pointer;transition:all .18s var(--ease);position:relative}
.client-card:hover{border-color:var(--brand-border);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.cc-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;margin-bottom:12px}
.cc-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.cc-company{font-size:12px;color:var(--text3);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-meta{display:flex;gap:8px;flex-wrap:wrap}
.cc-tag{font-size:11px;color:var(--text4);display:flex;align-items:center;gap:3px}
.cc-tag svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2}
.cc-actions{display:flex;gap:4px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.cc-action{flex:1;font-size:11px;font-weight:500;text-align:center;padding:5px;border-radius:6px;border:none;background:var(--surface2);color:var(--text3);cursor:pointer;transition:all .12s;font-family:inherit}
.cc-action:hover{background:var(--brand-light);color:var(--brand)}

/* List view */
.client-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:12px 16px;display:grid;grid-template-columns:40px 1fr auto auto;gap:12px;align-items:center;cursor:pointer;transition:all .15s}
.client-row:hover{border-color:var(--brand-border);box-shadow:var(--shadow);transform:translateX(2px)}
.cr-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.cr-name{font-size:13px;font-weight:600;color:var(--text)}
.cr-sub{font-size:11px;color:var(--text3)}
.cr-email{font-size:12px;color:var(--text3)}
.cr-actions-row{display:flex;gap:4px}
.row-btn{font-size:11px;padding:5px 10px;border-radius:var(--r);border:none;background:var(--surface2);color:var(--text3);cursor:pointer;font-family:inherit;transition:all .12s}
.row-btn:hover{background:var(--brand-light);color:var(--brand)}

.empty-state{text-align:center;padding:72px 24px;color:var(--text4);animation:fadeInUp .4s var(--ease)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.empty-icon-wrap{width:64px;height:64px;background:var(--surface2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px}
.empty-title{font-size:16px;font-weight:700;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:13px;line-height:1.6;margin-bottom:20px;max-width:320px;margin-left:auto;margin-right:auto}

/* Skeleton */
.skeleton-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.skeleton-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:18px}
.sk{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-avatar{width:44px;height:44px;border-radius:12px;margin-bottom:12px}
.sk-line{height:12px;margin-bottom:8px}.sk-line.w60{width:60%}.sk-line.w40{width:40%}.sk-line.w80{width:80%}

/* Delete confirm row */
.delete-confirm{display:none;background:var(--danger-bg,#FEF2F2);border:1px solid rgba(220,38,38,.18);border-radius:var(--r);padding:12px 14px;margin-top:16px;font-size:13px;color:#B91C1C;align-items:center;gap:10px;flex-wrap:wrap}
.delete-confirm.show{display:flex}
.delete-confirm strong{flex:1}
.delete-confirm-btns{display:flex;gap:6px}
.dc-cancel{padding:5px 12px;border-radius:var(--rfull);border:1px solid rgba(220,38,38,.25);background:transparent;color:#B91C1C;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.dc-confirm{padding:5px 12px;border-radius:var(--rfull);border:none;background:#DC2626;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}

/* Button loading state */
.btn.loading{pointer-events:none;opacity:.7}
.btn-spinner-sm{width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.loading .btn-spinner-sm{display:inline-block}
.btn.loading .btn-label-txt{display:none}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:90%;max-width:480px;max-height:90vh;overflow-y:auto;padding:24px;transform:translateY(8px) scale(.98);transition:transform .2s var(--ease)}
.modal-overlay.open .modal{transform:none}
.modal-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:18px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.full{grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select,.fg textarea{padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;color:var(--text);background:var(--surface);font-family:inherit;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--brand)}
.fg textarea{resize:vertical;min-height:70px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rfull);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s;text-decoration:none;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 2px 6px rgba(0,51,153,.18)}
.btn-primary:hover{background:var(--brand2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,51,153,.25)}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{background:var(--surface2)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0D1117;color:#fff;padding:10px 20px;border-radius:var(--rfull);font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:9999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.success{background:var(--success)}.toast.error{background:var(--danger)}

@media(max-width:768px){
  .shell-page{padding-bottom:72px}
  .client-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .page-header{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="shell-sidebar" id="shell-sidebar"></aside>
  <div class="shell-overlay sb-overlay" id="shell-overlay"></div>
  <header class="shell-topbar" id="shell-topbar"></header>
  <main class="shell-main">
    <div class="shell-page">

      <div class="page-header">
        <div class="page-title-row">
          <h1 class="page-title">Clients</h1>
          <span class="page-count" id="client-count">(0)</span>
        </div>
        <div style="display:flex;gap:8px">
          <a href="import.html" class="btn btn-ghost btn-sm">
            <svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
            Import
          </a>
          <button class="btn btn-primary" onclick="openModal()">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Client
          </button>
        </div>
      </div>

      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" data-filter="individual" onclick="setFilter('individual',this)">Individual</button>
        <button class="filter-btn" data-filter="company" onclick="setFilter('company',this)">Company</button>
        <div class="view-toggle">
          <button class="view-btn active" id="vg" onclick="setView('grid')" title="Grid">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
          </button>
          <button class="view-btn" id="vl" onclick="setView('list')" title="List">
            <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
      </div>

      <div id="clients-container"></div>
    </div>
  </main>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-title" id="modal-title">Add Client</div>
    <div class="form-row">
      <div class="fg"><label>First name *</label><input id="f-first" placeholder="Sophie" maxlength="80"></div>
      <div class="fg"><label>Last name *</label><input id="f-last" placeholder="Martin" maxlength="80"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Email</label><input id="f-email" type="email" placeholder="sophie@co.fr" maxlength="200"></div>
      <div class="fg"><label>Phone</label><input id="f-phone" placeholder="+33 6 00 00 00" maxlength="40"></div>
    </div>
    <div class="form-row full">
      <div class="fg"><label>Company</label><input id="f-company" placeholder="Agence Martin" maxlength="120"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Type</label>
        <select id="f-type">
          <option value="individual">Individual</option>
          <option value="company">Company</option>
        </select>
      </div>
      <div class="fg"><label>City</label><input id="f-city" placeholder="Paris" maxlength="80"></div>
    </div>
    <div class="form-row full">
      <div class="fg"><label>Notes</label><textarea id="f-notes" placeholder="Internal notes…" maxlength="1000"></textarea></div>
    </div>
    <!-- Custom delete confirm (replaces native confirm()) -->
    <div class="delete-confirm" id="delete-confirm">
      <strong>Delete this client permanently?</strong>
      <div class="delete-confirm-btns">
        <button class="dc-cancel" onclick="cancelDelete()">Cancel</button>
        <button class="dc-confirm" onclick="confirmDelete()">Yes, delete</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('modal-overlay').classList.remove('open')">Cancel</button>
      <button id="btn-delete" class="btn btn-danger btn-sm" style="display:none" onclick="askDelete()">Delete</button>
      <button class="btn btn-primary" id="btn-save" onclick="saveClient()">
        <div class="btn-spinner-sm"></div>
        <span class="btn-label-txt">Save</span>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var _supa = supabase.createClient(SUPA_URL, SUPA_KEY);
var _clients = [], _uid = null, _view = 'grid', _filter = 'all', _editId = null;
var COLORS = ['#EEF2FF','#ECFDF5','#FEF3C7','#FEF2F2','#F5F3FF','#E0F2FE'];
var TEXT_COLORS = ['#003399','#059669','#D97706','#DC2626','#7C3AED','#0284C7'];

function sanitize(s) { var d = document.createElement('div'); d.textContent = String(s||''); return d.innerHTML; }
function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (type||'') + ' show';
  setTimeout(function() { t.className = 'toast'; }, 3000);
}

(async function init() {
  try {
    var session = await _supa.auth.getSession();
    if (!session.data.session) { window.location.href = 'login.html'; return; }
    _uid = session.data.session.user.id;
    var user = session.data.session.user;

    // Init shell
    var meta = user.user_metadata || {};
    var name = (meta.full_name || meta.name || '').trim();
    var sub = await _supa.from('subscriptions').select('plan,status').eq('user_id', _uid).single().then(function(r){return r.data;}).catch(function(){return null;});
    var isPro = sub && sub.plan === 'pro' && sub.status === 'active';

    Shell.init({
      page: 'clients', title: 'Clients',
      isPro: isPro, userName: name, userEmail: user.email || '',
      onSearch: function(q) { renderClients(q); }
    });

    showSkeleton();
    await loadClients();
  } catch(e) {
    console.error('[Clients init]', e);
    toast('Failed to load. Please refresh.', 'error');
  }
})();

function showSkeleton() {
  var el = document.getElementById('clients-container');
  el.className = 'skeleton-grid';
  el.innerHTML = [1,2,3,4,5,6].map(function(){
    return '<div class="skeleton-card">' +
      '<div class="sk sk-avatar"></div>' +
      '<div class="sk sk-line w80"></div>' +
      '<div class="sk sk-line w60"></div>' +
      '<div class="sk sk-line w40" style="margin-top:16px"></div>' +
    '</div>';
  }).join('');
}

async function loadClients() {
  try {
    var { data, error } = await _supa.from('clients').select('*').eq('user_id', _uid).order('created_at', { ascending: false });
    if (error) throw error;
    _clients = data || [];
    renderClients();
  } catch(e) {
    console.error('[loadClients]', e);
    document.getElementById('clients-container').innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-icon-wrap">⚠️</div>' +
        '<div class="empty-title">Could not load clients</div>' +
        '<div class="empty-sub">' + sanitize(e.message) + '</div>' +
      '</div>';
  }
}

function getFiltered(search) {
  var list = _clients;
  if (_filter !== 'all') list = list.filter(function(c) { return c.type === _filter; });
  if (search) {
    var q = search.toLowerCase();
    list = list.filter(function(c) {
      return ((c.first_name||'') + ' ' + (c.last_name||'') + ' ' + (c.company||'') + ' ' + (c.email||'')).toLowerCase().includes(q);
    });
  }
  return list;
}

function renderClients(search) {
  var filtered = getFiltered(search);
  var el = document.getElementById('clients-container');
  var countEl = document.getElementById('client-count');
  if (countEl) countEl.textContent = '(' + filtered.length + ')';

  if (!filtered.length) {
    var noClients = !_clients.length;
    el.className = '';
    el.innerHTML = '<div class="empty-state">' +
      '<div class="empty-icon-wrap">' + (noClients ? '👥' : '🔍') + '</div>' +
      '<div class="empty-title">' + (noClients ? 'No clients yet' : 'No results') + '</div>' +
      '<div class="empty-sub">' + (noClients ? 'Add your first client to start tracking your business relationships.' : 'Try a different search or filter.') + '</div>' +
      (noClients ? '<button class="btn btn-primary" onclick="openModal()"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add First Client</button>' : '') +
      '</div>';
    return;
  }

  if (_view === 'list') {
    el.className = 'client-list';
  // Event delegation for row clicks
  el.onclick = function(e) {
    var row = e.target.closest('.client-row');
    if (row && !e.target.closest('.cc-action,.row-btn,a')) openModal(row.dataset.id);
  };
    el.innerHTML = filtered.map(function(c, i) {
      var ci = i % COLORS.length;
      var ini = ((c.first_name||'')[0]||'') + ((c.last_name||'')[0]||'');
      return '<div class="client-row" data-id="' + c.id + '">' +
        '<div class="cr-avatar" style="background:' + COLORS[ci] + ';color:' + TEXT_COLORS[ci] + '">' + sanitize(ini.toUpperCase()) + '</div>' +
        '<div><div class="cr-name">' + sanitize((c.first_name||'') + ' ' + (c.last_name||'')) + '</div>' +
          '<div class="cr-sub">' + (c.company ? sanitize(c.company) : '') + '</div></div>' +
        '<div class="cr-email">' + sanitize(c.email||'—') + '</div>' +
        '<div class="cr-actions-row">' +
          (c.email ? '<a href="mailto:' + c.email + '" class="row-btn" onclick="event.stopPropagation()">Email</a>' : '') +
          '<button class="row-btn" data-cid="'+c.id+'" onclick="event.stopPropagation();openModal(this.dataset.cid)">Edit</button>' +
        '</div>' +
      '</div>';
    }).join('');
  } else {
    el.className = 'client-grid';
  el.onclick = function(e) {
    var card = e.target.closest('.client-card');
    if (card && !e.target.closest('.cc-action,a')) openModal(card.dataset.id);
  };
    el.innerHTML = filtered.map(function(c, i) {
      var ci = i % COLORS.length;
      var ini = ((c.first_name||'')[0]||'') + ((c.last_name||'')[0]||'');
      return '<div class="client-card" data-id="' + c.id + '">' +
        '<div class="cc-avatar" style="background:' + COLORS[ci] + ';color:' + TEXT_COLORS[ci] + '">' + sanitize(ini.toUpperCase()) + '</div>' +
        '<div class="cc-name">' + sanitize((c.first_name||'') + ' ' + (c.last_name||'')) + '</div>' +
        (c.company ? '<div class="cc-company">' + sanitize(c.company) + '</div>' : '<div class="cc-company" style="color:var(--text4)">Individual</div>') +
        '<div class="cc-meta">' +
          (c.email ? '<span class="cc-tag"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>' + sanitize(c.email) + '</span>' : '') +
          (c.phone ? '<span class="cc-tag"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.94 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>' + sanitize(c.phone) + '</span>' : '') +
        '</div>' +
        '<div class="cc-actions">' +
          (c.email ? '<a class="cc-action" href="mailto:'+sanitize(c.email)+'" onclick="event.stopPropagation()">Email</a>' : '') +
          '<button class="cc-action" data-cid="'+c.id+'" onclick="event.stopPropagation();openModal(this.dataset.cid)">Edit</button>' +
          '<button class="cc-action" data-cid="'+c.id+'" data-cname="'+sanitize((c.first_name||'')+' '+(c.last_name||'')).trim()+'" onclick="event.stopPropagation();newInvoice(this.dataset.cid,this.dataset.cname)">Invoice</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }
}

function setFilter(f, el) {
  _filter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  el.classList.add('active');
  renderClients();
}

function setView(v) {
  _view = v;
  document.getElementById('vg').classList.toggle('active', v==='grid');
  document.getElementById('vl').classList.toggle('active', v==='list');
  renderClients();
}

function askDelete() {
  document.getElementById('delete-confirm').classList.add('show');
  document.getElementById('btn-delete').style.display = 'none';
}
function cancelDelete() {
  document.getElementById('delete-confirm').classList.remove('show');
  document.getElementById('btn-delete').style.display = 'inline-flex';
}
function confirmDelete() { deleteClient(); }

function openModal(id) {
  _editId = id || null;
  document.getElementById('delete-confirm').classList.remove('show');
  var title = document.getElementById('modal-title');
  var del = document.getElementById('btn-delete');
  if (id) {
    var c = _clients.find(function(x){ return x.id === id; });
    if (!c) return;
    document.getElementById('f-first').value = c.first_name || '';
    document.getElementById('f-last').value = c.last_name || '';
    document.getElementById('f-email').value = c.email || '';
    document.getElementById('f-phone').value = c.phone || '';
    document.getElementById('f-company').value = c.company || '';
    document.getElementById('f-type').value = c.type || 'individual';
    document.getElementById('f-city').value = c.city || '';
    document.getElementById('f-notes').value = c.notes || '';
    title.textContent = 'Edit Client';
    del.style.display = 'inline-flex';
  } else {
    ['f-first','f-last','f-email','f-phone','f-company','f-city','f-notes'].forEach(function(id){ var el=document.getElementById(id); if(el) el.value=''; });
    document.getElementById('f-type').value = 'individual';
    title.textContent = 'Add Client';
    del.style.display = 'none';
  }
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('f-first').focus();
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

async function saveClient() {
  var first = document.getElementById('f-first').value.trim();
  var last = document.getElementById('f-last').value.trim();
  if (!first && !last) { toast('Please enter at least a first or last name.', 'error'); return; }
  var email = document.getElementById('f-email').value.trim();
  if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('Please enter a valid email address.', 'error'); return; }

  var btn = document.getElementById('btn-save');
  btn.classList.add('loading');

  var payload = {
    user_id: _uid,
    first_name: first,
    last_name: last,
    email: email || null,
    phone: document.getElementById('f-phone').value.trim() || null,
    company: document.getElementById('f-company').value.trim() || null,
    type: document.getElementById('f-type').value || 'individual',
    city: document.getElementById('f-city').value.trim() || null,
    notes: document.getElementById('f-notes').value.trim() || null,
    updated_at: new Date().toISOString()
  };

  try {
    var op;
    if (_editId) {
      op = await _supa.from('clients').update(payload).eq('id', _editId).eq('user_id', _uid);
    } else {
      payload.created_at = new Date().toISOString();
      op = await _supa.from('clients').insert(payload);
    }
    if (op.error) throw op.error;
    toast(_editId ? 'Client updated.' : 'Client added.', 'success');
    document.getElementById('modal-overlay').classList.remove('open');
    await loadClients();
  } catch(e) {
    toast('Failed to save: ' + sanitize(e.message), 'error');
  } finally {
    btn.classList.remove('loading');
  }
}

async function deleteClient() {
  if (!_editId) return;
  try {
    var { error } = await _supa.from('clients').delete().eq('id', _editId).eq('user_id', _uid);
    if (error) throw error;
    toast('Client deleted.', 'success');
    document.getElementById('modal-overlay').classList.remove('open');
    await loadClients();
  } catch(e) {
    toast('Delete failed: ' + sanitize(e.message), 'error');
    cancelDelete();
  }
}

function newInvoice(clientId, name) {
  window.location.href = 'invoices.html?client=' + encodeURIComponent(clientId) + '&name=' + encodeURIComponent(name);
}

window.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('open');
});
</script>
</body>
</html>
