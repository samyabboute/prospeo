<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — Prospeo</title>
<meta name="description" content="Sign in to your Prospeo account.">
  <script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#003399;
  --brand-dark:#002277;
  --brand-rgb:0,51,153;
  --text:#1D1D1F;
  --text2:#6E6E73;
  --text3:#AEAEB2;
  --bg:#F5F5F7;
  --white:#FFFFFF;
  --border:rgba(0,0,0,.1);
  --border-focus:rgba(0,51,153,.4);
  --error:#FF3B30;
  --success:#34C759;
  --r:14px;
  --input-h:46px;
  --ease:cubic-bezier(.25,.46,.45,.94);
}
html{-webkit-font-smoothing:antialiased;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--bg);min-height:100vh;display:grid;grid-template-rows:auto 1fr auto;color:var(--text)}

/* ── NAV ─────────────────────────────────────────────────────── */
nav{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:0.5px solid var(--border);background:rgba(245,245,247,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:10}
.nav-logo{font-size:19px;font-weight:700;color:var(--text);letter-spacing:-.5px;text-decoration:none}
.nav-logo span{color:var(--brand)}
.nav-back{font-size:13px;color:var(--brand);text-decoration:none;display:flex;align-items:center;gap:4px;transition:opacity .2s}
.nav-back:hover{opacity:.7}
.nav-back::before{content:'‹';font-size:18px;font-weight:300}

/* ── LAYOUT ──────────────────────────────────────────────────── */
.main{display:flex;align-items:center;justify-content:center;padding:40px 20px;min-height:calc(100vh - 104px)}
.card{background:var(--white);border-radius:20px;border:0.5px solid var(--border);padding:40px 40px 36px;width:100%;max-width:400px;box-shadow:0 2px 20px rgba(0,0,0,.06)}

/* ── LOGO BLOCK ──────────────────────────────────────────────── */
.card-logo{text-align:center;margin-bottom:28px}
.logo-mark{width:52px;height:52px;background:var(--brand);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 4px 16px rgba(0,51,153,.28)}
.logo-mark svg{width:28px;height:28px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-name{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.logo-name span{color:var(--brand)}

/* ── TABS ────────────────────────────────────────────────────── */
.tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:24px}
.tab{padding:8px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center;border:none;background:none;transition:all .2s}
.tab:hover:not(.active){color:var(--text);background:rgba(0,0,0,.04)}
.tab.active{background:var(--white);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* ── OAUTH ───────────────────────────────────────────────────── */
.oauth-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.oauth-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;height:var(--input-h);border-radius:var(--r);border:1px solid var(--border);background:var(--white);font-size:14px;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s;text-decoration:none}
.oauth-btn:hover{background:#F5F5F7;border-color:rgba(0,0,0,.18)}
.oauth-btn svg{width:18px;height:18px;flex-shrink:0}

/* ── DIVIDER ─────────────────────────────────────────────────── */
.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:12px;color:var(--text3);font-weight:500;white-space:nowrap}

/* ── FORM ────────────────────────────────────────────────────── */
.form-group{margin-bottom:14px;position:relative}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-input{width:100%;height:var(--input-h);border:1px solid var(--border);border-radius:var(--r);padding:0 14px;font-size:15px;color:var(--text);font-family:inherit;background:var(--white);transition:border-color .15s,box-shadow .15s;outline:none;-webkit-appearance:none}
.form-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,51,153,.12)}
.form-input.error{border-color:var(--error)}
.form-input::placeholder{color:var(--text3)}
.pw-toggle{position:absolute;right:14px;bottom:13px;cursor:pointer;color:var(--text3);font-size:13px;user-select:none;transition:color .15s}
.pw-toggle:hover{color:var(--text)}
.form-hint{font-size:12px;color:var(--text3);margin-top:5px}
.form-error{font-size:12px;color:var(--error);margin-top:5px;display:none}
.form-error.show{display:block}

/* ── PASSWORD STRENGTH ───────────────────────────────────────── */
.pw-strength{margin-top:6px;display:none}
.pw-strength.show{display:block}
.pw-bars{display:flex;gap:4px;margin-bottom:4px}
.pw-bar{flex:1;height:3px;border-radius:2px;background:var(--bg);transition:background .3s}
.pw-bar.w{background:#FF3B30}.pw-bar.f{background:#FF9500}.pw-bar.g{background:#34C759}.pw-bar.s{background:#007AFF}
.pw-label{font-size:11px;color:var(--text3)}

/* ── FORGOT ──────────────────────────────────────────────────── */
.forgot{font-size:13px;color:var(--brand);text-decoration:none;float:right;margin-top:-2px;transition:opacity .2s}
.forgot:hover{opacity:.7}

/* ── SUBMIT BTN ──────────────────────────────────────────────── */
.btn-submit{width:100%;height:46px;background:var(--brand);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s var(--ease);margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;box-shadow:0 2px 12px rgba(0,51,153,.28)}
.btn-submit:hover{background:var(--brand-dark);box-shadow:0 4px 20px rgba(0,51,153,.38);transform:translateY(-1px)}
.btn-submit:active{transform:translateY(0)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn-submit.loading .spinner{display:block}
.btn-submit.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MESSAGE ─────────────────────────────────────────────────── */
.msg{padding:12px 14px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:16px;display:none;align-items:center;gap:8px}
.msg.show{display:flex}
.msg-ok{background:#F0FFF4;color:#1A6B3A;border:1px solid rgba(52,199,89,.2)}
.msg-err{background:#FFF2F2;color:#CC2929;border:1px solid rgba(255,59,48,.2)}
.msg-icon{font-size:16px;flex-shrink:0}

/* ── DEMO ────────────────────────────────────────────────────── */
.demo-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border-radius:var(--r);background:rgba(0,51,153,.06);border:1px solid rgba(0,51,153,.14);color:var(--brand);font-size:13px;font-weight:500;cursor:pointer;margin-top:12px;transition:all .2s var(--ease);font-family:inherit}
.demo-btn:hover{background:rgba(0,51,153,.1);border-color:rgba(0,51,153,.22)}
.demo-dot{width:6px;height:6px;border-radius:50%;background:var(--brand);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── FOOTER ──────────────────────────────────────────────────── */
.card-footer{margin-top:20px;text-align:center;font-size:12px;color:var(--text3);line-height:1.6}
.card-footer a{color:var(--text3);text-decoration:none;transition:color .15s}
.card-footer a:hover{color:var(--brand)}

footer{border-top:0.5px solid var(--border);height:52px;display:flex;align-items:center;justify-content:center;gap:24px}
footer a{font-size:12px;color:var(--text3);text-decoration:none;transition:color .15s}
footer a:hover{color:var(--brand)}

  /* ── ANIMATED MESH BACKGROUND ─────────────────────────── */
  .bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .bg-canvas::before{
    content:'';
    position:absolute;inset:-50%;
    width:200%;height:200%;
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(99,102,241,.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 20%, rgba(0,102,255,.14) 0%, transparent 55%),
      radial-gradient(ellipse 70% 50% at 50% 80%, rgba(139,92,246,.12) 0%, transparent 60%),
      radial-gradient(ellipse 90% 40% at 10% 70%, rgba(59,130,246,.1) 0%, transparent 50%),
      radial-gradient(ellipse 50% 70% at 90% 60%, rgba(168,85,247,.1) 0%, transparent 55%);
    animation:meshMove 18s ease-in-out infinite alternate;
    will-change:transform;
  }
  .bg-canvas::after{
    content:'';
    position:absolute;inset:-50%;
    width:200%;height:200%;
    background:
      radial-gradient(ellipse 55% 65% at 70% 40%, rgba(99,102,241,.1) 0%, transparent 55%),
      radial-gradient(ellipse 75% 45% at 30% 65%, rgba(0,51,153,.1) 0%, transparent 60%),
      radial-gradient(ellipse 45% 75% at 60% 15%, rgba(147,51,234,.08) 0%, transparent 50%);
    animation:meshMove2 24s ease-in-out infinite alternate;
    will-change:transform;
  }
  @keyframes meshMove{
    0%  {transform:translate(0,0) rotate(0deg) scale(1)}
    25% {transform:translate(3%,2%) rotate(1deg) scale(1.02)}
    50% {transform:translate(-2%,4%) rotate(-1deg) scale(1.04)}
    75% {transform:translate(4%,-2%) rotate(.5deg) scale(1.01)}
    100%{transform:translate(-3%,3%) rotate(-1.5deg) scale(1.03)}
  }
  @keyframes meshMove2{
    0%  {transform:translate(0,0) rotate(0deg) scale(1.02)}
    33% {transform:translate(-4%,-3%) rotate(2deg) scale(1)}
    66% {transform:translate(3%,2%) rotate(-1deg) scale(1.03)}
    100%{transform:translate(-2%,4%) rotate(1deg) scale(1.01)}
  }
  /* Noise texture overlay for depth */
  .bg-noise{
    position:fixed;inset:0;z-index:1;pointer-events:none;
    opacity:.025;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:200px 200px;
  }
  /* Floating orbs */
  .bg-orb{position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:0;opacity:.55}
  .bg-orb-1{width:500px;height:500px;background:rgba(99,102,241,.12);top:-10%;left:-10%;animation:orbFloat1 20s ease-in-out infinite}
  .bg-orb-2{width:400px;height:400px;background:rgba(0,102,255,.1);top:50%;right:-8%;animation:orbFloat2 25s ease-in-out infinite}
  .bg-orb-3{width:350px;height:350px;background:rgba(139,92,246,.1);bottom:-5%;left:30%;animation:orbFloat3 22s ease-in-out infinite}
  @keyframes orbFloat1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(4%,3%) scale(1.05)}66%{transform:translate(-3%,5%) scale(.97)}}
  @keyframes orbFloat2{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(-5%,-4%) scale(1.06)}70%{transform:translate(3%,-2%) scale(.95)}}
  @keyframes orbFloat3{0%,100%{transform:translate(0,0) scale(1)}30%{transform:translate(3%,-4%) scale(1.04)}60%{transform:translate(-4%,2%) scale(.98)}}

  /* Ensure all foreground content sits above bg */
  nav,main,footer{position:relative;z-index:2}
  /* Glassmorphism on the card */
  .card{
    background:rgba(255,255,255,.82) !important;
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid rgba(255,255,255,.6) !important;
    box-shadow:0 8px 32px rgba(0,0,0,.08),0 1px 0 rgba(255,255,255,.8) inset !important;
  }
  /* Nav glassmorphism */
  nav{
    background:rgba(245,245,247,.75) !important;
    backdrop-filter:blur(24px) saturate(180%) !important;
    -webkit-backdrop-filter:blur(24px) saturate(180%) !important;
  }
  /* Body bg — light base under the gradient */
  body{background:linear-gradient(135deg,#F0F4FF 0%,#F5F0FF 50%,#EFF6FF 100%) !important}
  /* Dark mode adaptation */
  [data-theme=dark] body{background:linear-gradient(135deg,#0D0F1A 0%,#120D1F 50%,#0A0F1E 100%) !important}
  [data-theme=dark] .bg-canvas::before{
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(99,102,241,.22) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 20%, rgba(0,102,255,.18) 0%, transparent 55%),
      radial-gradient(ellipse 70% 50% at 50% 80%, rgba(139,92,246,.18) 0%, transparent 60%),
      radial-gradient(ellipse 90% 40% at 10% 70%, rgba(59,130,246,.15) 0%, transparent 50%),
      radial-gradient(ellipse 50% 70% at 90% 60%, rgba(168,85,247,.15) 0%, transparent 55%);
  }
  [data-theme=dark] .card{
    background:rgba(28,28,35,.82) !important;
    border:1px solid rgba(255,255,255,.08) !important;
    box-shadow:0 8px 32px rgba(0,0,0,.4),0 1px 0 rgba(255,255,255,.04) inset !important;
  }
  [data-theme=dark] .bg-orb-1{background:rgba(99,102,241,.18)}
  [data-theme=dark] .bg-orb-2{background:rgba(0,102,255,.15)}
  [data-theme=dark] .bg-orb-3{background:rgba(139,92,246,.15)}


  /* ── LOGIN MOBILE ── */
  @media(max-width:600px){
    body{padding:0}
    .auth-split{flex-direction:column;min-height:100vh}
    .auth-brand{display:none}
    .auth-form-wrap{
      width:100%;min-height:100vh;
      padding:40px 20px 60px;
      border-radius:0;
      justify-content:center;
    }
    .auth-card{width:100%;max-width:100%;padding:28px 20px;border-radius:16px}
    .auth-logo{margin-bottom:28px}
    .form-group input{padding:11px 14px;font-size:16px}
    .auth-submit{padding:13px;font-size:15px}
    .auth-alt{margin-top:20px}
  }
  @media(max-width:380px){
    .auth-card{padding:22px 16px}
    .auth-form-wrap{padding:24px 14px 50px}
  }
  /* iOS input zoom prevention */
  @supports (-webkit-touch-callout: none){
    .form-group input{font-size:16px!important}
  }

</style>

<body>

<div class="bg-canvas"></div>
<div class="bg-noise"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<nav>
  <a href="index.html" class="nav-logo" style="display:flex;align-items:center"><img src="prospeo-logo.svg" alt="Prospeo" style="height:24px;width:auto;display:block;vertical-align:middle"></a>
  <a class="nav-back" href="index.html">Home</a>
</nav>

<main class="main">
  <div class="card">

    <!-- Logo -->
    <div class="card-logo">
      <div class="logo-mark"><img src="prospeo-logo-white.svg" alt="Prospeo" style="height:20px;width:auto;filter:brightness(10)"></div><div class="logo-name"><img src="prospeo-logo.svg" alt="Prospeo" style="height:18px;width:auto"></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign in</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Create account</button>
    </div>

    <!-- Message -->
    <div class="msg msg-ok" id="msg-ok"><span class="msg-icon">&#10003;</span><span id="msg-ok-text"></span></div>
    <div class="msg msg-err" id="msg-err"><span class="msg-icon">&#33;</span><span id="msg-err-text"></span></div>

    <!-- OAuth -->
    <div class="oauth-btns">
      <button class="oauth-btn" onclick="oauthLogin('google')">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
      <button class="oauth-btn" onclick="oauthLogin('azure')">
        <svg viewBox="0 0 24 24"><path d="M11.4 24H0l8.8-15.3 4.1 7.1L8.5 22h10.7L24 24H11.4z" fill="#0078D4"/><path d="M13.2 0l-4.6 8L0 8.7 8.8 8.7 13.4 1.1 20.8 14.3 24 8.7z" fill="#0078D4"/></svg>
        Continue with Microsoft
      </button>
    </div>

    <div class="divider"><span>or</span></div>

    <!-- Sign In Form -->
    <div id="form-login">
      <div class="form-group">
        <label class="form-label" for="li-email">Email</label>
        <input class="form-input" type="email" required inputmode="email" id="li-email" placeholder="you@example.com" autocomplete="email" onkeydown="if(event.key==='Enter')signIn()">
      </div>
      <div class="form-group">
        <label class="form-label" for="li-pw">
          Password
          <a class="forgot" href="#" onclick="forgotPw(event)">Forgot?</a>
        </label>
        <input class="form-input" type="password" required id="li-pw" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')signIn()">
        <span class="pw-toggle" onclick="togglePw('li-pw',this)">Show</span>
      </div>
      <button class="btn-submit" id="btn-signin" onclick="signIn()">
        <span class="btn-text">Sign in</span>
        <div class="spinner"></div>
      </button>
      <button class="demo-btn" onclick="fillDemo()">
        <span class="demo-dot"></span>
        Try demo account
      </button>
    </div>

    <!-- Register Form -->
    <div id="form-register" style="display:none">
      <div class="form-group">
        <label class="form-label" for="re-name">Full name</label>
        <input class="form-input" type="text" id="re-name" placeholder="Sophie Martin" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label" for="re-email">Email</label>
        <input class="form-input" type="email" required inputmode="email" id="re-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="re-pw">Password</label>
        <input class="form-input" type="password" required id="re-pw" placeholder="At least 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
        <span class="pw-toggle" onclick="togglePw('re-pw',this)">Show</span>
        <div class="pw-strength" id="pw-strength">
          <div class="pw-bars">
            <div class="pw-bar" id="pb1"></div>
            <div class="pw-bar" id="pb2"></div>
            <div class="pw-bar" id="pb3"></div>
            <div class="pw-bar" id="pb4"></div>
          </div>
          <span class="pw-label" id="pw-label">Enter a password</span>
        </div>
      </div>
      <button class="btn-submit" id="btn-register" onclick="register()">
        <span class="btn-text">Create account</span>
        <div class="spinner"></div>
      </button>
    </div>

    <div class="card-footer">
      By continuing, you agree to our
      <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a>.<br>
      All data stored in Frankfurt, EU. &#127466;&#127482;
    </div>

  </div>
</main>

<footer>
  <a href="index.html">Home</a>
  <a href="index.html#pricing">Pricing</a>
  <a href="privacy.html">Privacy</a>
  <a href="terms.html">Terms</a>
</footer>

<script>
var _supa = supabase.createClient(SUPA_URL, SUPA_KEY);
// Dark mode persistence
(function(){
  var t=localStorage.getItem('prospeo-theme');
  if(!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) t='dark';
  if(t) document.documentElement.setAttribute('data-theme',t);
})();

// ── CHECK EXISTING SESSION ─────────────────────────────────────
(async function(){
  var s = await _supa.auth.getSession();
  if (s.data.session) { window.location.href = 'app.html'; }
  // Handle hash redirect from Supabase (email confirmation)
  var hash = window.location.hash;
  if (hash.includes('access_token')) {
    showMsg('ok', 'Email confirmed! Signing you in...');
    setTimeout(function(){ window.location.href = 'app.html'; }, 1200);
  }
  // Check for register tab in hash
  if (hash === '#register' || window.location.search.includes('register')) {
    switchTab('register');
  }
})();

// ── TABS ──────────────────────────────────────────────────────
function switchTab(t) {
  var isLogin = t === 'login';
  document.getElementById('tab-login').classList.toggle('active', isLogin);
  document.getElementById('tab-register').classList.toggle('active', !isLogin);
  document.getElementById('form-login').style.display = isLogin ? 'block' : 'none';
  document.getElementById('form-register').style.display = isLogin ? 'none' : 'block';
  hideMsg();
}

// ── MESSAGES ──────────────────────────────────────────────────
function showMsg(type, text) {
  hideMsg();
  var el = document.getElementById('msg-' + type);
  document.getElementById('msg-' + type + '-text').textContent = text;
  el.classList.add('show');
}
function hideMsg() {
  document.getElementById('msg-ok').classList.remove('show');
  document.getElementById('msg-err').classList.remove('show');
}

// ── LOADING ───────────────────────────────────────────────────
function setLoading(btnId, loading) {
  var btn = document.getElementById(btnId);
  btn.classList.toggle('loading', loading);
  btn.disabled = loading;
}

// ── SIGN IN ───────────────────────────────────────────────────
async function signIn() {
  hideMsg();
  var email = (document.getElementById('li-email').value || '').trim();
  var pw = document.getElementById('li-pw').value || '';
  if (!email || !pw) { showMsg('err', 'Please enter your email and password.'); return; }
  setLoading('btn-signin', true);
  try {
    var r = await _supa.auth.signInWithPassword({ email: email, password: pw });
    if (r.error) throw r.error;
    window.location.href = 'app.html';
  } catch(e) {
    var msg = e.message || 'Sign in failed.';
    if (msg.includes('Invalid login')) msg = 'Incorrect email or password.';
    if (msg.includes('Email not confirmed')) msg = 'Please confirm your email first. Check your inbox.';
    showMsg('err', msg);
    setLoading('btn-signin', false);
  }
}

// ── REGISTER ──────────────────────────────────────────────────
async function register() {
  hideMsg();
  var name = (document.getElementById('re-name').value || '').trim();
  var email = (document.getElementById('re-email').value || '').trim();
  var pw = document.getElementById('re-pw').value || '';
  if (!email || !pw) { showMsg('err', 'Please fill in all fields.'); return; }
  if (pw.length < 8) { showMsg('err', 'Password must be at least 8 characters.'); return; }
  setLoading('btn-register', true);
  try {
    var parts = name.split(' ');
    var r = await _supa.auth.signUp({
      email: email, password: pw,
      options: { data: { first_name: parts[0] || name, last_name: parts.slice(1).join(' ') || '' },
        emailRedirectTo: APP_URL + '/login.html' }
    });
    if (r.error) throw r.error;
    showMsg('ok', 'Account created! Check your email to confirm, then sign in.');
    switchTab('login');
    document.getElementById('li-email').value = email;
  } catch(e) {
    var msg = e.message || 'Registration failed.';
    if (msg.includes('already registered')) msg = 'This email is already registered. Try signing in.';
    showMsg('err', msg);
    setLoading('btn-register', false);
  }
}

// ── OAUTH ─────────────────────────────────────────────────────
async function oauthLogin(provider) {
  try {
    var r = await _supa.auth.signInWithOAuth({
      provider: provider,
      options: { redirectTo: APP_URL + '/app.html' }
    });
    if (r.error) throw r.error;
  } catch(e) {
    showMsg('err', (provider === 'google' ? 'Google' : 'Microsoft') + ' login is not configured yet.');
  }
}

// ── FORGOT PASSWORD ───────────────────────────────────────────
async function forgotPw(e) {
  e.preventDefault();
  var email = (document.getElementById('li-email').value || '').trim();
  if (!email) { showMsg('err', 'Enter your email above first.'); return; }
  try {
    await _supa.auth.resetPasswordForEmail(email, {
      redirectTo: APP_URL + '/login.html'
    });
    showMsg('ok', 'Password reset email sent. Check your inbox.');
  } catch(e) {
    showMsg('err', 'Could not send reset email. Try again.');
  }
}

// ── DEMO ──────────────────────────────────────────────────────
function fillDemo() {
  switchTab('login');
  document.getElementById('li-email').value = 'demo@prospeo.app';
  document.getElementById('li-pw').value = 'Demo1234!';
  showMsg('ok', 'Demo credentials filled — click Sign in.');
}

// ── PASSWORD UTILS ────────────────────────────────────────────
function togglePw(id, el) {
  var input = document.getElementById(id);
  var isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  el.textContent = isText ? 'Show' : 'Hide';
}

function checkStrength(pw) {
  var s = document.getElementById('pw-strength');
  s.classList.toggle('show', pw.length > 0);
  var score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
  if (/[0-9!@#$%^&*]/.test(pw)) score++;
  var bars = ['pb1','pb2','pb3','pb4'];
  var classes = ['w','f','g','s'];
  var labels = ['','Weak','Fair','Good','Strong'];
  bars.forEach(function(id, i) {
    var bar = document.getElementById(id);
    bar.className = 'pw-bar ' + (i < score ? classes[score-1] : '');
  });
  document.getElementById('pw-label').textContent = labels[score] || 'Too short';
}

window.addEventListener('unhandledrejection', function(e) {
  console.error('[Login]', e.reason);
});
</script>
