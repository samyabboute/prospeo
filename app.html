<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PROSPEO — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
:root{
  --navy:#0A1628;--navy2:#152238;--indigo:#4F46E5;--indigo2:#4338CA;
  --indigo-light:#EEF2FF;--indigo-glow:rgba(79,70,229,.15);
  --white:#FFFFFF;--bg:#F7F8FC;--bg2:#EFF1F8;
  --border:#E2E6F0;--border2:#CDD3E2;--muted:#8892A4;--text:#1A2235;--text2:#4A5568;
  --green:#10B981;--green-bg:#ECFDF5;--amber:#F59E0B;--amber-bg:#FFFBEB;
  --red:#EF4444;--red-bg:#FEF2F2;--blue:#3B82F6;--blue-bg:#EFF6FF;
  --stage-new:#8B5CF6;--stage-contacted:#3B82F6;--stage-qualified:#F59E0B;
  --stage-proposal:#EC4899;--stage-won:#10B981;--stage-lost:#6B7280;
  --sidebar-w:240px;--topbar-h:60px;--radius:10px;--radius-lg:16px;
  --shadow-sm:0 1px 3px rgba(10,22,40,.06),0 1px 2px rgba(10,22,40,.04);
  --shadow:0 4px 16px rgba(10,22,40,.08),0 1px 4px rgba(10,22,40,.04);
  --shadow-lg:0 12px 40px rgba(10,22,40,.12),0 4px 12px rgba(10,22,40,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:.75rem;font-weight:600;color:var(--text2);letter-spacing:.3px;margin-bottom:6px;text-transform:uppercase;}
.field input,.field select,.field textarea{width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;padding:11px 14px;outline:none;transition:border-color .18s,box-shadow .18s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigo-glow);}
.field input::placeholder{color:var(--muted);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--radius);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;font-weight:600;padding:11px 20px;transition:all .18s;text-decoration:none;white-space:nowrap;}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.btn-primary{background:var(--indigo);color:#fff;box-shadow:0 4px 14px rgba(79,70,229,.35);}
.btn-primary:hover{background:var(--indigo2);box-shadow:0 6px 20px rgba(79,70,229,.45);transform:translateY(-1px);}
.btn-secondary{background:var(--white);color:var(--text);border:1.5px solid var(--border);}
.btn-secondary:hover{border-color:var(--border2);background:var(--bg);}
.btn-ghost{background:transparent;color:var(--text2);}
.btn-ghost:hover{background:var(--bg);}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.btn-danger:hover{background:var(--red);color:#fff;}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid rgba(16,185,129,.2);}
.btn-success:hover{background:var(--green);color:#fff;}
.btn-full{width:100%;}
.btn-sm{padding:7px 13px;font-size:.78rem;}
.btn-lg{padding:14px 28px;font-size:.95rem;}
.btn-icon{padding:8px;border-radius:8px;}
.app-layout{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--topbar-h) 1fr;min-height:100vh;}
.topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 24px 0 0;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.topbar-brand{width:var(--sidebar-w);padding:0 24px;display:flex;align-items:center;border-right:1px solid var(--border);height:100%;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.topbar-user{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:var(--radius);cursor:pointer;transition:background .15s;}
.topbar-user:hover{background:var(--bg);}
.topbar-avatar{width:32px;height:32px;border-radius:50%;background:var(--indigo);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#fff;flex-shrink:0;}
.topbar-uname{font-size:.83rem;font-weight:600;color:var(--text);}
.topbar-role{font-size:.7rem;color:var(--muted);}
.topbar-search{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:7px 14px;min-width:240px;}
.topbar-search svg{width:14px;height:14px;stroke:var(--muted);flex-shrink:0;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.topbar-search input{background:transparent;border:none;outline:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:.83rem;color:var(--text);width:100%;}
.topbar-search input::placeholder{color:var(--muted);}
.sidebar{background:var(--white);border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;position:sticky;top:var(--topbar-h);height:calc(100vh - var(--topbar-h));}
.sidebar-section{font-size:.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:12px 10px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;text-decoration:none;color:var(--text2);font-size:.85rem;font-weight:500;transition:all .15s;}
.nav-item:hover{background:var(--bg);color:var(--text);}
.nav-item.active{background:var(--indigo-light);color:var(--indigo);font-weight:600;}
.nav-item.active svg{stroke:var(--indigo);}
.nav-item svg{width:17px;height:17px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;transition:stroke .15s;}
.nav-badge{margin-left:auto;background:var(--indigo);color:#fff;font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:999px;}
.main{overflow-y:auto;height:calc(100vh - var(--topbar-h));}
.page{padding:28px 28px 60px;max-width:1400px;}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap;}
.page-title{font-size:1.35rem;font-weight:800;color:var(--navy);}
.page-sub{font-size:.8rem;color:var(--muted);margin-top:3px;}
.page-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);}
.card-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.card-title{font-size:.9rem;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:8px;}
.card-title svg{width:16px;height:16px;stroke:var(--indigo);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.card-body{padding:20px;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0;}
.kpi-card.k-indigo::before{background:var(--indigo);}
.kpi-card.k-green::before{background:var(--green);}
.kpi-card.k-amber::before{background:var(--amber);}
.kpi-card.k-blue::before{background:var(--blue);}
.kpi-ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.kpi-ic svg{width:19px;height:19px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.kpi-card.k-indigo .kpi-ic{background:var(--indigo-light);}
.kpi-card.k-indigo .kpi-ic svg{stroke:var(--indigo);}
.kpi-card.k-green .kpi-ic{background:var(--green-bg);}
.kpi-card.k-green .kpi-ic svg{stroke:var(--green);}
.kpi-card.k-amber .kpi-ic{background:var(--amber-bg);}
.kpi-card.k-amber .kpi-ic svg{stroke:var(--amber);}
.kpi-card.k-blue .kpi-ic{background:var(--blue-bg);}
.kpi-card.k-blue .kpi-ic svg{stroke:var(--blue);}
.kpi-num{font-size:1.75rem;font-weight:800;color:var(--navy);line-height:1;margin-bottom:4px;}
.kpi-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.kpi-change{font-size:.75rem;margin-top:8px;font-weight:600;}
.kpi-change.up{color:var(--green);}
.kpi-change.down{color:var(--red);}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;font-weight:600;padding:3px 9px;border-radius:999px;white-space:nowrap;}
.badge-indigo{background:var(--indigo-light);color:var(--indigo);}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-amber{background:var(--amber-bg);color:var(--amber);}
.badge-red{background:var(--red-bg);color:var(--red);}
.badge-blue{background:var(--blue-bg);color:var(--blue);}
.badge-gray{background:var(--bg2);color:var(--muted);}
.stage-new{background:#F5F3FF;color:var(--stage-new);}
.stage-contacted{background:var(--blue-bg);color:var(--stage-contacted);}
.stage-qualified{background:var(--amber-bg);color:var(--stage-qualified);}
.stage-proposal{background:#FDF2F8;color:var(--stage-proposal);}
.stage-won{background:var(--green-bg);color:var(--stage-won);}
.stage-lost{background:var(--bg2);color:var(--stage-lost);}
.biz-company{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE;}
.biz-freelancer{background:#F5F3FF;color:#6D28D9;border:1px solid #DDD6FE;}
.biz-individual{background:var(--bg2);color:var(--muted);border:1px solid var(--border);}
.table-wrap{overflow-x:auto;}
table.data-table{width:100%;border-collapse:collapse;}
table.data-table th{font-size:.68rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);padding:10px 16px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;background:var(--bg);}
table.data-table td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:.84rem;vertical-align:middle;}
table.data-table tbody tr:hover td{background:var(--bg);}
table.data-table tbody tr:last-child td{border-bottom:none;}
.pipeline-board{display:flex;gap:16px;overflow-x:auto;padding-bottom:16px;}
.pipeline-col{flex-shrink:0;width:280px;background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);}
.pipeline-col-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);}
.pipeline-col-title{display:flex;align-items:center;gap:8px;font-size:.82rem;font-weight:700;color:var(--navy);}
.pipeline-col-dot{width:8px;height:8px;border-radius:50%;}
.pipeline-col-count{font-size:.72rem;font-weight:600;background:var(--white);border:1px solid var(--border);border-radius:999px;padding:2px 9px;color:var(--muted);}
.pipeline-cards{padding:12px;display:flex;flex-direction:column;gap:10px;min-height:120px;}
.pipeline-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .18s;box-shadow:var(--shadow-sm);}
.pipeline-card:hover{border-color:var(--indigo);box-shadow:var(--shadow);transform:translateY(-1px);}
.pipeline-card-name{font-size:.85rem;font-weight:600;color:var(--navy);margin-bottom:4px;}
.pipeline-card-company{font-size:.75rem;color:var(--muted);margin-bottom:10px;}
.pipeline-card-footer{display:flex;align-items:center;justify-content:space-between;}
.pipeline-card-value{font-size:.8rem;font-weight:700;color:var(--indigo);}
.pipeline-card-date{font-size:.72rem;color:var(--muted);}
.modal-overlay{position:fixed;inset:0;z-index:9000;background:rgba(10,22,40,.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;animation:modalIn .2s cubic-bezier(.22,1,.36,1);}
.modal-lg{max-width:720px;}
@keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.98);}to{opacity:1;transform:none;}}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:1rem;font-weight:700;color:var(--navy);}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:10px;}
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--navy);color:#fff;border-radius:var(--radius);padding:12px 18px;font-size:.82rem;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);min-width:280px;animation:toastIn .25s ease;}
@keyframes toastIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:none;}}
.toast.success{border-left:3px solid var(--green);}
.toast.error{border-left:3px solid var(--red);}
.toast.info{border-left:3px solid var(--indigo);}
.toast svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.toast.success svg{stroke:var(--green);}
.toast.error svg{stroke:var(--red);}
.toast.info svg{stroke:#a5b4fc;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);}
.cal-day-header{background:var(--bg);padding:10px;text-align:center;font-size:.68rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
.cal-day{background:var(--white);min-height:110px;padding:8px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.cal-day:nth-child(7n){border-right:none;}
.cal-day:hover{background:var(--bg);}
.cal-day.today{background:var(--indigo-light);}
.cal-day.today .cal-day-num{background:var(--indigo);color:#fff;}
.cal-day.other-month{background:var(--bg);}
.cal-day.other-month .cal-day-num{color:var(--border2);}
.cal-day-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:4px;}
.cal-event{font-size:.68rem;font-weight:600;padding:2px 7px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-event.meeting{background:#EEF2FF;color:var(--indigo);}
.cal-event.task{background:var(--amber-bg);color:var(--amber);}
.cal-event.call{background:var(--green-bg);color:var(--green);}
.cal-event.deadline{background:var(--red-bg);color:var(--red);}
.invoice-status-draft{background:var(--bg2);color:var(--muted);}
.invoice-status-sent{background:var(--blue-bg);color:var(--blue);}
.invoice-status-paid{background:var(--green-bg);color:var(--green);}
.invoice-status-overdue{background:var(--red-bg);color:var(--red);}
.validator-result{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--radius);margin-top:10px;font-size:.83rem;}
.validator-result.verified{background:var(--green-bg);border:1px solid rgba(16,185,129,.2);color:#065F46;}
.validator-result.unverified{background:var(--amber-bg);border:1px solid rgba(245,158,11,.2);color:#92400E;}
.empty-state{padding:60px 20px;text-align:center;color:var(--muted);}
.empty-state svg{width:40px;height:40px;stroke:var(--border2);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;display:block;margin:0 auto 16px;}
.empty-state h3{font-size:.95rem;font-weight:700;color:var(--text2);margin-bottom:6px;}
.empty-state p{font-size:.8rem;}
.divider{height:1px;background:var(--border);margin:20px 0;}
@media(max-width:1024px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:768px){:root{--sidebar-w:0px;}}
</style>
</head>
<body>
<div class="toast-container" id="toasts"></div>

<!-- ADD LEAD MODAL -->
<div class="modal-overlay" id="modal-lead">
  <div class="modal modal-lg">
    <div class="modal-header"><div class="modal-title">Add New Lead</div><button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal(this.closest('.modal-overlay').id)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field"><label>First Name *</label><input type="text" id="l-fname" placeholder="Jean"></div>
        <div class="field"><label>Last Name *</label><input type="text" id="l-lname" placeholder="Dupont"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Company</label><input type="text" id="l-company" placeholder="Acme SA"></div>
        <div class="field"><label>Job Title</label><input type="text" id="l-jobtitle" placeholder="CEO"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="jean@acme.com"></div>
        <div class="field"><label>Phone</label><input type="tel" id="l-phone" placeholder="+33 6 00 00 00 00"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Pipeline Stage</label>
          <select id="l-stage">
            <option value="new">New</option><option value="contacted">Contacted</option>
            <option value="qualified">Qualified</option><option value="proposal">Proposal Sent</option>
            <option value="won">Won</option><option value="lost">Lost</option>
          </select>
        </div>
        <div class="field"><label>Client Type</label>
          <select id="l-type"><option value="company">Company</option><option value="freelancer">Freelancer</option><option value="individual">Individual</option></select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Deal Value (&#x20AC;)</label><input type="number" id="l-value" placeholder="5000"></div>
        <div class="field"><label>Expected Close Date</label><input type="date" id="l-closedate"></div>
      </div>
      <div class="field"><label>Country</label>
        <select id="l-country">
          <option value="FR">France</option><option value="DE">Germany</option><option value="BE">Belgium</option>
          <option value="CH">Switzerland</option><option value="NL">Netherlands</option><option value="ES">Spain</option>
          <option value="IT">Italy</option><option value="PL">Poland</option><option value="OTHER">Other</option>
        </select>
      </div>
      <div class="field"><label>VAT Number (EU)</label><input type="text" id="l-vat" placeholder="FR12345678901"></div>
      <div class="field"><label>Notes</label><textarea id="l-notes" rows="3" placeholder="Context, source, remarks&#x2026;"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-lead')">Cancel</button>
      <button class="btn btn-primary" onclick="saveLead()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Lead
      </button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title" id="detail-title">Lead Detail</div>
      <div style="display:flex;gap:8px"><button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal('modal-detail')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<div class="app-layout">
  <header class="topbar">
    <div class="topbar-brand"><svg id="Calque_1" style="height:24px;width:auto;display:block" data-name="Calque 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 255.48 48.35">
  <defs>
    <style>
      .cls-1 {
        fill: #4F46E5;
        stroke-width: 0px;
      }

function getToken(){return localStorage.getItem('prospeo_token');}

async function api(path,opts={}){
  const token=getToken();
  const res=await fetch(SUPA_URL+'/rest/v1/'+path,{
    ...opts,
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+token,'Content-Type':'application/json','Prefer':opts.prefer||'return=representation',...(opts.headers||{})}
  });
  if(res.status===204)return null;
  const d=await res.json();
  if(!res.ok)throw new Error(d.message||d.error||'API error');
  return d;
}
function toast(msg,type){
  type=type||'info';
  var icons={success:'<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',error:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',info:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'};
  var container=document.getElementById('toasts');
  if(!container){container=document.createElement('div');container.id='toasts';container.className='toast-container';document.body.appendChild(container);}
  var t=document.createElement('div');
  t.className='toast '+type;
  t.innerHTML=(icons[type]||icons.info)+'<span>'+msg+'</span>';
  container.appendChild(t);
  setTimeout(function(){t.style.opacity='0';},3000);
  setTimeout(function(){t.remove();},3300);
}

async function validateVAT(country,vatNum){
  if(!vatNum||vatNum.length<8)return{valid:false,reason:'VAT number too short'};
  var prefix=vatNum.replace(/\s/g,'').toUpperCase().slice(0,2);
  var euCodes=['AT','BE','BG','CY','CZ','DE','DK','EE','EL','ES','FI','FR','GB','HR','HU','IE','IT','LT','LU','LV','MT','NL','PL','PT','RO','SE','SI','SK'];
  if(!euCodes.includes(prefix))return{valid:false,reason:'Not a recognised EU VAT prefix'};
  await new Promise(function(r){setTimeout(r,800);});
  return{valid:true,name:'Company verified via VIES',address:country+' \u00B7 EU Registered',vatNumber:vatNum.toUpperCase()};
}

}

function renderKPIs(){
  var total=ALL_LEADS.length;
  var won=ALL_LEADS.filter(function(l){return l.stage==='won';}).length;
  var revenue=ALL_LEADS.filter(function(l){return l.stage==='won';}).reduce(function(s,l){return s+(+l.deal_value||0);},0);
  var conv=total>0?Math.round(won/total*100):0;
  document.getElementById('k-total').textContent=total;
  document.getElementById('k-won').textContent=won;
  document.getElementById('k-revenue').textContent=fmtMoney(revenue);
  document.getElementById('k-conv').textContent=conv+'%';
  var thisWeek=ALL_LEADS.filter(function(l){return Date.now()-new Date(l.created_at).getTime()<7*86400000;}).length;
  document.getElementById('k-total-ch').innerHTML='↑ '+thisWeek+' this week';
  document.getElementById('k-won-ch').innerHTML=won>0?'✓ '+Math.round(won/Math.max(total,1)*100)+'% win rate':'No wins yet';
}

var chartPipeline,chartMonthly;
function renderCharts(){
  var stageVals=STAGES.map(function(s){return ALL_LEADS.filter(function(l){return l.stage===s.id;}).reduce(function(a,l){return a+(+l.deal_value||0);},0);});
  if(chartPipeline)chartPipeline.destroy();
  chartPipeline=new Chart(document.getElementById('chart-pipeline'),{
    type:'bar',
    data:{labels:STAGES.map(function(s){return s.label;}),datasets:[{data:stageVals,backgroundColor:STAGES.map(function(s){return s.color+'33';}),borderColor:STAGES.map(function(s){return s.color;}),borderWidth:2,borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:function(v){return v>=1000?'€'+(v/1000).toFixed(0)+'k':'€'+v;},font:{family:'Plus Jakarta Sans',size:10}},grid:{color:'#E2E6F0'}},x:{ticks:{font:{family:'Plus Jakarta Sans',size:10}},grid:{display:false}}}}
  });
  var months=[],counts=[];
  for(var i=5;i>=0;i--){
    var d=new Date();d.setMonth(d.getMonth()-i);
    months.push(d.toLocaleString('en-GB',{month:'short'}));
    var ym=d.toISOString().slice(0,7);
    counts.push(ALL_LEADS.filter(function(l){return l.created_at&&l.created_at.startsWith(ym);}).length);
  }
  if(chartMonthly)chartMonthly.destroy();
  chartMonthly=new Chart(document.getElementById('chart-monthly'),{
    type:'line',
    data:{labels:months,datasets:[{data:counts,borderColor:'#4F46E5',backgroundColor:'rgba(79,70,229,.08)',fill:true,tension:.4,pointBackgroundColor:'#4F46E5',pointRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{stepSize:1,font:{family:'Plus Jakarta Sans',size:10}},grid:{color:'#E2E6F0'}},x:{ticks:{font:{family:'Plus Jakarta Sans',size:10}},grid:{display:false}}}}
  });
}

function renderActivity(){
  var feed=document.getElementById('activity-feed');
  var recent=[].concat(ALL_LEADS).sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);}).slice(0,8);
  if(!recent.length){feed.innerHTML='<div class="empty-state" style="padding:20px"><p>No activity yet</p></div>';return;}
  feed.innerHTML=recent.map(function(l){
    var name=(l.first_name||'')+' '+(l.last_name||'');
    var diff=Date.now()-new Date(l.created_at).getTime();
    var ago=diff<60000?'just now':diff<3600000?Math.floor(diff/60000)+'m ago':diff<86400000?Math.floor(diff/3600000)+'h ago':Math.floor(diff/86400000)+'d ago';
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--border)">'
      +'<div class="topbar-avatar" style="width:28px;height:28px;font-size:.65rem;flex-shrink:0">'+initials(name)+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-size:.8rem;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+name.trim()+'</div>'
      +'<div style="font-size:.7rem;color:var(--muted)">'+(l.company||l.client_type||'Lead')+' · '+ago+'</div></div>'
      +stageBadge(l.stage)+'</div>';
  }).join('');
}

function updateStageNav(){
  STAGES.forEach(function(s){
    var el=document.getElementById('snav-'+s.id);
    if(el)el.textContent=ALL_LEADS.filter(function(l){return l.stage===s.id;}).length||'';
  });
}

var stageFilter=null;
function filterByStage(s){stageFilter=stageFilter===s?null:s;renderPipeline();}

function toggleView(v){
  currentView=v;
  document.getElementById('btn-board').style.color=v==='board'?'var(--indigo)':'';
  document.getElementById('btn-list').style.color=v==='list'?'var(--indigo)':'';
  renderPipeline();
}

function filterLeads(){renderPipeline();}

function renderPipeline(){
  var search=(document.getElementById('global-search')||{}).value||'';
  var leads=ALL_LEADS.filter(function(l){
    var q=search.toLowerCase();
    var match=!q||[l.first_name,l.last_name,l.company,l.email].join(' ').toLowerCase().includes(q);
    return match&&(!stageFilter||l.stage===stageFilter);
  });
  var el=document.getElementById('pipeline-view');
  if(currentView==='board'){
    var activeSt=stageFilter?STAGES.filter(function(s){return s.id===stageFilter;}):STAGES;
    el.innerHTML='<div class="pipeline-board">'+activeSt.map(function(s){
      var cols=leads.filter(function(l){return l.stage===s.id;});
      var total=cols.reduce(function(a,l){return a+(+l.deal_value||0);},0);
      return '<div class="pipeline-col">'
        +'<div class="pipeline-col-header"><div class="pipeline-col-title"><span class="pipeline-col-dot" style="background:'+s.color+'"></span>'+s.label+'</div>'
        +'<span class="pipeline-col-count">'+cols.length+(total>0?' · '+fmtMoney(total):'')+'</span></div>'
        +'<div class="pipeline-cards">'+(cols.length?cols.map(function(l){return pipelineCard(l);}).join(''):'<div style="text-align:center;padding:20px;color:var(--border2);font-size:.75rem">Empty</div>')+'</div>'
        +'</div>';
    }).join('')+'</div>';
  }else{
    if(!leads.length){el.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><h3>No leads yet</h3><p>Add your first lead to get started</p></div>';return;}
    el.innerHTML='<div class="table-wrap"><table class="data-table"><thead><tr><th>Name</th><th>Company</th><th>Type</th><th>Stage</th><th>Value</th><th>Country</th><th>Added</th><th></th></tr></thead><tbody>'
      +leads.map(function(l){
        var name=(l.first_name||'')+' '+(l.last_name||'');
        return '<tr><td><div style="display:flex;align-items:center;gap:8px"><div class="topbar-avatar" style="width:30px;height:30px;font-size:.7rem;flex-shrink:0">'+initials(name)+'</div><div><div style="font-weight:600">'+name.trim()+'</div><div style="font-size:.72rem;color:var(--muted)">'+(l.email||'')+'</div></div></div></td>'
          +'<td>'+(l.company||'—')+'</td>'
          +'<td>'+bizBadge(l.client_type||'individual')+'</td>'
          +'<td>'+stageBadge(l.stage||'new')+'</td>'
          +'<td style="font-weight:600;color:var(--indigo)">'+(l.deal_value?fmtMoney(l.deal_value):'—')+'</td>'
          +'<td><span class="badge badge-gray">'+(l.country||'—')+'</span></td>'
          +'<td style="color:var(--muted)">'+fmtDateShort(l.created_at)+'</td>'
          +'<td><div style="display:flex;gap:4px">'
          +'<button class="btn btn-ghost btn-icon btn-sm" onclick="openDetail(\''+l.id+'\')" title="View"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>'
          +'<button class="btn btn-danger btn-icon btn-sm" onclick="deleteLead(\''+l.id+'\')" title="Delete"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>'
          +'</div></td></tr>';
      }).join('')+'</tbody></table></div>';
  }
}

function pipelineCard(l){
  var name=((l.first_name||'')+' '+(l.last_name||'')).trim();
  return '<div class="pipeline-card" onclick="openDetail(\''+l.id+'\')">'
    +'<div class="pipeline-card-name">'+name+'</div>'
    +'<div class="pipeline-card-company">'+(l.company||bizBadge(l.client_type||'individual'))+'</div>'
    +'<div class="pipeline-card-footer"><div class="pipeline-card-value">'+(l.deal_value?fmtMoney(l.deal_value):'No value')+'</div><div class="pipeline-card-date">'+fmtDateShort(l.created_at)+'</div></div>'
    +'</div>';
}

function openDetail(id){
  var l=ALL_LEADS.find(function(x){return x.id===id;});if(!l)return;
  var name=((l.first_name||'')+' '+(l.last_name||'')).trim();
  document.getElementById('detail-title').textContent=name;
  function r(label,val){return '<div style="display:flex;justify-content:space-between;align-items:center;font-size:.83rem;padding:5px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">'+label+'</span><span>'+val+'</span></div>';}
  document.getElementById('detail-body').innerHTML=
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">'
    +'<div>'+r('Email',l.email||'—')+r('Phone',l.phone||'—')+r('Company',l.company||'—')+r('Country',l.country||'—')+r('Type',bizBadge(l.client_type||'individual'))+'</div>'
    +'<div>'+r('Stage',stageBadge(l.stage||'new'))+r('Value',l.deal_value?'<strong style="color:var(--indigo)">'+fmtMoney(l.deal_value)+'</strong>':'—')+r('Added',fmtDate(l.created_at))+'</div></div>'
    +(l.notes?'<div style="margin-top:20px;padding:14px;background:var(--bg);border-radius:var(--radius);font-size:.83rem;color:var(--text2)">'+l.notes+'</div>':'')
    +'<div style="display:flex;gap:8px;margin-top:20px;flex-wrap:wrap">'
    +'<button class="btn btn-secondary btn-sm" onclick="moveStage(\''+l.id+'\',\'new\')">New</button>'
    +'<button class="btn btn-secondary btn-sm" onclick="moveStage(\''+l.id+'\',\'contacted\')">Contacted</button>'
    +'<button class="btn btn-secondary btn-sm" onclick="moveStage(\''+l.id+'\',\'qualified\')">Qualified</button>'
    +'<button class="btn btn-secondary btn-sm" onclick="moveStage(\''+l.id+'\',\'proposal\')">Proposal</button>'
    +'<button class="btn btn-success btn-sm" onclick="moveStage(\''+l.id+'\',\'won\')">&#x2713; Won</button>'
    +'<button class="btn btn-danger btn-sm" onclick="moveStage(\''+l.id+'\',\'lost\')">&#x2717; Lost</button>'
    +'</div>';
  openModal('modal-detail');
}

async function moveStage(id,stage){
  var l=ALL_LEADS.find(function(x){return x.id===id;});if(!l)return;
  l.stage=stage;
  try{await api('leads?id=eq.'+id,{method:'PATCH',body:JSON.stringify({stage:stage})});}catch(e){}
  toast('Moved to '+stage,'success');
  closeModal('modal-detail');
  renderKPIs();renderCharts();renderPipeline();updateStageNav();
}

async function saveLead(){
  var user=getUser();
  var lead={
    user_id:user.id,
    first_name:document.getElementById('l-fname').value.trim(),
    last_name:document.getElementById('l-lname').value.trim(),
    company:document.getElementById('l-company').value.trim(),
    job_title:document.getElementById('l-jobtitle').value.trim(),
    email:document.getElementById('l-email').value.trim(),
    phone:document.getElementById('l-phone').value.trim(),
    stage:document.getElementById('l-stage').value,
    client_type:document.getElementById('l-type').value,
    deal_value:parseFloat(document.getElementById('l-value').value)||null,
    expected_close_date:document.getElementById('l-closedate').value||null,
    country:document.getElementById('l-country').value,
    vat_number:document.getElementById('l-vat').value.trim()||null,
    notes:document.getElementById('l-notes').value.trim(),
    created_at:new Date().toISOString()
  };
  if(!lead.first_name||!lead.last_name){toast('First and last name are required','error');return;}
  try{
    var saved=await api('leads',{method:'POST',body:JSON.stringify(lead)});
    ALL_LEADS.unshift(Array.isArray(saved)?saved[0]:lead);
    toast('Lead added successfully','success');
  }catch(e){
    lead.id='local-'+Date.now();
    ALL_LEADS.unshift(lead);
    toast('Lead added (demo mode)','info');
  }
  closeModal('modal-lead');
  ['l-fname','l-lname','l-company','l-jobtitle','l-email','l-phone','l-value','l-closedate','l-vat','l-notes'].forEach(function(id){document.getElementById(id).value='';});
  renderKPIs();renderCharts();renderActivity();renderPipeline();updateStageNav();
}

async function deleteLead(id){
  confirm2('Delete this lead permanently?',async function(){
    ALL_LEADS=ALL_LEADS.filter(function(l){return l.id!==id;});
    try{await api('leads?id=eq.'+id,{method:'DELETE'});}catch(e){}
    toast('Lead deleted','info');
    renderKPIs();renderCharts();renderActivity();renderPipeline();updateStageNav();
  });
}
</script>
</body>
</html>
