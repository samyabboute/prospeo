<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PROSPEO — Calendar</title>
<style>
/* ═══════════════════════════════════════════════
   PROSPEO — Core Design System
   Sharp & Corporate · European Standards
═══════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

:root {
  /* Brand */
  --navy:       #0A1628;
  --navy2:      #152238;
  --navy3:      #1E3252;
  --indigo:     #4F46E5;
  --indigo2:    #4338CA;
  --indigo-light: #EEF2FF;
  --indigo-glow: rgba(79,70,229,.15);

  /* Neutrals */
  --white:      #FFFFFF;
  --bg:         #F7F8FC;
  --bg2:        #EFF1F8;
  --border:     #E2E6F0;
  --border2:    #CDD3E2;
  --muted:      #8892A4;
  --text:       #1A2235;
  --text2:      #4A5568;

  /* Status */
  --green:      #10B981;
  --green-bg:   #ECFDF5;
  --amber:      #F59E0B;
  --amber-bg:   #FFFBEB;
  --red:        #EF4444;
  --red-bg:     #FEF2F2;
  --blue:       #3B82F6;
  --blue-bg:    #EFF6FF;

  /* Pipeline stages */
  --stage-new:       #8B5CF6;
  --stage-contacted: #3B82F6;
  --stage-qualified:  #F59E0B;
  --stage-proposal:  #EC4899;
  --stage-won:       #10B981;
  --stage-lost:      #6B7280;

  /* Layout */
  --sidebar-w: 240px;
  --topbar-h:  60px;
  --radius:    10px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 3px rgba(10,22,40,.06), 0 1px 2px rgba(10,22,40,.04);
  --shadow:    0 4px 16px rgba(10,22,40,.08), 0 1px 4px rgba(10,22,40,.04);
  --shadow-lg: 0 12px 40px rgba(10,22,40,.12), 0 4px 12px rgba(10,22,40,.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* ══ AUTH LAYOUT ══ */
.auth-page {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
}
.auth-left {
  background: var(--navy);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 48px;
  position: relative;
  overflow: hidden;
}
.auth-left::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(79,70,229,.25) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 80%, rgba(79,70,229,.15) 0%, transparent 60%);
  pointer-events: none;
}
.auth-left-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
.auth-brand {
  position: relative;
  z-index: 1;
}
.auth-logo {
  font-family: 'Instrument Serif', serif;
  font-size: 2rem;
  color: #fff;
  letter-spacing: -.5px;
}
.auth-logo span { color: var(--indigo); font-style: italic; }
.auth-tagline {
  font-size: .8rem;
  color: rgba(255,255,255,.45);
  margin-top: 6px;
  letter-spacing: .5px;
  text-transform: uppercase;
}
.auth-features {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.auth-feat {
  display: flex;
  align-items: center;
  gap: 14px;
}
.auth-feat-ic {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: rgba(79,70,229,.2);
  border: 1px solid rgba(79,70,229,.35);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.auth-feat-ic svg { width: 18px; height: 18px; stroke: #a5b4fc; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.auth-feat-title { font-size: .85rem; font-weight: 600; color: #fff; }
.auth-feat-sub { font-size: .75rem; color: rgba(255,255,255,.45); margin-top: 2px; }
.auth-footer-text {
  position: relative;
  z-index: 1;
  font-size: .72rem;
  color: rgba(255,255,255,.3);
}

.auth-right {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px;
  background: var(--white);
}
.auth-box {
  width: 100%;
  max-width: 400px;
}
.auth-box-title {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--navy);
  margin-bottom: 6px;
}
.auth-box-sub {
  font-size: .83rem;
  color: var(--muted);
  margin-bottom: 32px;
}
.auth-tabs {
  display: flex;
  background: var(--bg);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 28px;
  gap: 4px;
}
.auth-tab {
  flex: 1;
  padding: 9px;
  border: none;
  background: transparent;
  border-radius: 7px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: .82rem;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all .18s;
}
.auth-tab.active {
  background: var(--white);
  color: var(--navy);
  box-shadow: var(--shadow-sm);
}

/* ── FORM ELEMENTS ── */
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: .75rem;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: .3px;
  margin-bottom: 6px;
  text-transform: uppercase;
}
.field input, .field select, .field textarea {
  width: 100%;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: .9rem;
  padding: 11px 14px;
  outline: none;
  transition: border-color .18s, box-shadow .18s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--indigo);
  box-shadow: 0 0 0 3px var(--indigo-glow);
}
.field input::placeholder { color: var(--muted); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: .85rem;
  font-weight: 600;
  padding: 11px 20px;
  transition: all .18s;
  text-decoration: none;
  white-space: nowrap;
}
.btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.btn-primary { background: var(--indigo); color: #fff; box-shadow: 0 4px 14px rgba(79,70,229,.35); }
.btn-primary:hover { background: var(--indigo2); box-shadow: 0 6px 20px rgba(79,70,229,.45); transform: translateY(-1px); }
.btn-secondary { background: var(--white); color: var(--text); border: 1.5px solid var(--border); }
.btn-secondary:hover { border-color: var(--border2); background: var(--bg); }
.btn-ghost { background: transparent; color: var(--text2); }
.btn-ghost:hover { background: var(--bg); }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn-success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(16,185,129,.2); }
.btn-success:hover { background: var(--green); color: #fff; }
.btn-full { width: 100%; }
.btn-sm { padding: 7px 13px; font-size: .78rem; }
.btn-lg { padding: 14px 28px; font-size: .95rem; }
.btn-icon { padding: 8px; border-radius: 8px; }

/* ══ APP LAYOUT ══ */
.app-layout {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--topbar-h) 1fr;
  min-height: 100vh;
}

/* ── TOPBAR ── */
.topbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px 0 0;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-brand {
  width: var(--sidebar-w);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-right: 1px solid var(--border);
  height: 100%;
}
.topbar-logo {
  font-family: 'Instrument Serif', serif;
  font-size: 1.35rem;
  color: var(--navy);
  letter-spacing: -.3px;
}
.topbar-logo span { color: var(--indigo); font-style: italic; }
.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.topbar-user {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background .15s;
}
.topbar-user:hover { background: var(--bg); }
.topbar-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--indigo);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .78rem;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}
.topbar-uname { font-size: .83rem; font-weight: 600; color: var(--text); }
.topbar-role { font-size: .7rem; color: var(--muted); }
.topbar-search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 14px;
  min-width: 240px;
}
.topbar-search svg { width: 14px; height: 14px; stroke: var(--muted); flex-shrink: 0; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.topbar-search input {
  background: transparent;
  border: none;
  outline: none;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: .83rem;
  color: var(--text);
  width: 100%;
}
.topbar-search input::placeholder { color: var(--muted); }

/* ── SIDEBAR ── */
.sidebar {
  background: var(--white);
  border-right: 1px solid var(--border);
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow-y: auto;
  position: sticky;
  top: var(--topbar-h);
  height: calc(100vh - var(--topbar-h));
}
.sidebar-section {
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 12px 10px 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 8px;
  cursor: pointer;
  text-decoration: none;
  color: var(--text2);
  font-size: .85rem;
  font-weight: 500;
  transition: all .15s;
  position: relative;
}
.nav-item:hover { background: var(--bg); color: var(--text); }
.nav-item.active {
  background: var(--indigo-light);
  color: var(--indigo);
  font-weight: 600;
}
.nav-item.active svg { stroke: var(--indigo); }
.nav-item svg {
  width: 17px; height: 17px;
  stroke: var(--muted);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
  transition: stroke .15s;
}
.nav-badge {
  margin-left: auto;
  background: var(--indigo);
  color: #fff;
  font-size: .62rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 999px;
}

/* ── MAIN CONTENT ── */
.main {
  overflow-y: auto;
  height: calc(100vh - var(--topbar-h));
}
.page {
  padding: 28px 28px 60px;
  max-width: 1400px;
}
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 24px;
  gap: 16px;
  flex-wrap: wrap;
}
.page-title {
  font-size: 1.35rem;
  font-weight: 800;
  color: var(--navy);
}
.page-sub {
  font-size: .8rem;
  color: var(--muted);
  margin-top: 3px;
}
.page-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

/* ── CARDS ── */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}
.card-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.card-title {
  font-size: .9rem;
  font-weight: 700;
  color: var(--navy);
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title svg { width: 16px; height: 16px; stroke: var(--indigo); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.card-body { padding: 20px; }

/* ── KPI CARDS ── */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.kpi-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
  transition: transform .2s, box-shadow .2s;
}
.kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.kpi-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 3px 3px 0 0;
}
.kpi-card.k-indigo::before { background: var(--indigo); }
.kpi-card.k-green::before  { background: var(--green); }
.kpi-card.k-amber::before  { background: var(--amber); }
.kpi-card.k-blue::before   { background: var(--blue); }
.kpi-ic {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
}
.kpi-ic svg { width: 19px; height: 19px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.kpi-card.k-indigo .kpi-ic { background: var(--indigo-light); }
.kpi-card.k-indigo .kpi-ic svg { stroke: var(--indigo); }
.kpi-card.k-green  .kpi-ic { background: var(--green-bg); }
.kpi-card.k-green  .kpi-ic svg { stroke: var(--green); }
.kpi-card.k-amber  .kpi-ic { background: var(--amber-bg); }
.kpi-card.k-amber  .kpi-ic svg { stroke: var(--amber); }
.kpi-card.k-blue   .kpi-ic { background: var(--blue-bg); }
.kpi-card.k-blue   .kpi-ic svg { stroke: var(--blue); }
.kpi-num { font-size: 1.75rem; font-weight: 800; color: var(--navy); line-height: 1; margin-bottom: 4px; }
.kpi-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.kpi-change { font-size: .75rem; margin-top: 8px; font-weight: 600; }
.kpi-change.up { color: var(--green); }
.kpi-change.down { color: var(--red); }

/* ── BADGES ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: .7rem;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 999px;
  white-space: nowrap;
}
.badge-indigo { background: var(--indigo-light); color: var(--indigo); }
.badge-green  { background: var(--green-bg);     color: var(--green); }
.badge-amber  { background: var(--amber-bg);     color: var(--amber); }
.badge-red    { background: var(--red-bg);        color: var(--red); }
.badge-blue   { background: var(--blue-bg);       color: var(--blue); }
.badge-gray   { background: var(--bg2);           color: var(--muted); }

/* Pipeline stage badges */
.stage-new       { background: #F5F3FF; color: var(--stage-new); }
.stage-contacted { background: var(--blue-bg); color: var(--stage-contacted); }
.stage-qualified  { background: var(--amber-bg); color: var(--stage-qualified); }
.stage-proposal  { background: #FDF2F8; color: var(--stage-proposal); }
.stage-won       { background: var(--green-bg); color: var(--stage-won); }
.stage-lost      { background: var(--bg2); color: var(--stage-lost); }

/* Business type badges */
.biz-company { background: #EFF6FF; color: #1D4ED8; border: 1px solid #BFDBFE; }
.biz-freelancer { background: #F5F3FF; color: #6D28D9; border: 1px solid #DDD6FE; }
.biz-individual { background: var(--bg2); color: var(--muted); border: 1px solid var(--border); }

/* ── TABLES ── */
.table-wrap { overflow-x: auto; }
table.data-table { width: 100%; border-collapse: collapse; }
table.data-table th {
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  text-align: left;
  white-space: nowrap;
  background: var(--bg);
  cursor: pointer;
  user-select: none;
}
table.data-table th:hover { color: var(--text); }
table.data-table td {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  font-size: .84rem;
  vertical-align: middle;
}
table.data-table tbody tr:hover td { background: var(--bg); }
table.data-table tbody tr:last-child td { border-bottom: none; }

/* ── PIPELINE BOARD ── */
.pipeline-board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; }
.pipeline-col {
  flex-shrink: 0;
  width: 280px;
  background: var(--bg);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
}
.pipeline-col-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.pipeline-col-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: .82rem;
  font-weight: 700;
  color: var(--navy);
}
.pipeline-col-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}
.pipeline-col-count {
  font-size: .72rem;
  font-weight: 600;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 2px 9px;
  color: var(--muted);
}
.pipeline-cards { padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 120px; }
.pipeline-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: all .18s;
  box-shadow: var(--shadow-sm);
}
.pipeline-card:hover { border-color: var(--indigo); box-shadow: var(--shadow); transform: translateY(-1px); }
.pipeline-card-name { font-size: .85rem; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
.pipeline-card-company { font-size: .75rem; color: var(--muted); margin-bottom: 10px; }
.pipeline-card-footer { display: flex; align-items: center; justify-content: space-between; }
.pipeline-card-value { font-size: .8rem; font-weight: 700; color: var(--indigo); }
.pipeline-card-date { font-size: .72rem; color: var(--muted); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 9000;
  background: rgba(10,22,40,.5);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  animation: modalIn .2s cubic-bezier(.22,1,.36,1);
}
.modal-lg { max-width: 720px; }
@keyframes modalIn { from { opacity:0; transform:translateY(16px) scale(.98); } to { opacity:1; transform:none; } }
.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title { font-size: 1rem; font-weight: 700; color: var(--navy); }
.modal-body { padding: 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
}

/* ── TOAST ── */
.toast-container {
  position: fixed;
  top: 20px; right: 20px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--navy);
  color: #fff;
  border-radius: var(--radius);

.toast.success { border-left: 3px solid var(--green); }

.toast.success svg { stroke: var(--green); }
.toast.error   svg { stroke: var(--red); }
.toast.info    svg { stroke: #a5b4fc; }

.cal-day:nth-child(7n) { border-right: none; }
.cal-day:hover { background: var(--bg); }
.cal-day.today { background: var(--indigo-light); }
.cal-day.today .cal-day-num { background: var(--indigo); color: #fff; }
.cal-day.other-month { background: var(--bg); }
.cal-day.other-month .cal-day-num { color: var(--border2); }
.cal-day-num {
  width: 26px; height: 26px;
  border-radius: 50%;

  font-weight: 600;
  color: var(--text);

const SUPA_URL='https://nkovarvxecmwyicnusxz.supabase.co';
const SUPA_KEY='sb_publishable_6GupXDR_7KTyTLZdck8LRw_GKlsnJAK';
function getToken(){return localStorage.getItem('prospeo_token');}

async function api(path,opts={}){
  const token=getToken();
  const res=await fetch(SUPA_URL+'/rest/v1/'+path,{
    ...opts,
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+token,'Content-Type':'application/json','Prefer':opts.prefer||'return=representation',...(opts.headers||{})}
  });
  if(res.status===204)return null;
  const d=await res.json();
  if(!res.ok)throw new Error(d.message||d.error||'API error');
  return d;
}
function toast(msg,type){
  type=type||'info';

  if(!container){container=document.createElement('div');container.id='toasts';container.className='toast-container';document.body.appendChild(container);}
  var t=document.createElement('div');
  t.className='toast '+type;
  t.innerHTML=(icons[type]||icons.info)+'<span>'+msg+'</span>';
  container.appendChild(t);
  setTimeout(function(){t.style.opacity='0';},3000);
  setTimeout(function(){t.remove();},3300);
}

async function validateVAT(country,vatNum){
  if(!vatNum||vatNum.length<8)return{valid:false,reason:'VAT number too short'};
  var prefix=vatNum.replace(/\s/g,'').toUpperCase().slice(0,2);
  var euCodes=['AT','BE','BG','CY','CZ','DE','DK','EE','EL','ES','FI','FR','GB','HR','HU','IE','IT','LT','LU','LV','MT','NL','PL','PT','RO','SE','SI','SK'];
  if(!euCodes.includes(prefix))return{valid:false,reason:'Not a recognised EU VAT prefix'};
  await new Promise(function(r){setTimeout(r,800);});
  return{valid:true,name:'Company verified via VIES',address:country+' \u00B7 EU Registered',vatNumber:vatNum.toUpperCase()};
}

function getSampleEvents(){
  const d = new Date();
  const pad = n=>String(n).padStart(2,'0');
  const iso = (y,m,day) => `${y}-${pad(m+1)}-${pad(day)}`;
  const y=d.getFullYear(), m=d.getMonth();
  return [
    {id:'e1',title:'Call with Marie Laurent',event_date:iso(y,m,d.getDate()),event_time:'10:00',type:'call',client:'Innovatech SA',duration:30},
    {id:'e2',title:'Proposal review — Becker GmbH',event_date:iso(y,m,d.getDate()+1),event_time:'14:00',type:'meeting',client:'Becker GmbH',duration:60},
    {id:'e3',title:'Send invoice Q1',event_date:iso(y,m,d.getDate()+3),event_time:'09:00',type:'task',client:'',duration:0},
    {id:'e4',title:'Contract deadline — Kowalski',event_date:iso(y,m,d.getDate()+5),event_time:'17:00',type:'deadline',client:'Kowalski & Co.',duration:0},
    {id:'e5',title:'Follow-up Sofia Rossi',event_date:iso(y,m,d.getDate()+7),event_time:'11:00',type:'call',client:'',duration:30},
  ];
}

function renderCalendar(){
  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();
  document.getElementById('cal-month-title').textContent = new Date(y,m).toLocaleDateString('en-GB',{month:'long',year:'numeric'});

  const grid = document.getElementById('cal-grid');
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let html = days.map(d=>`<div class="cal-day-header">${d}</div>`).join('');

  const firstDay = new Date(y, m, 1);
  const lastDay = new Date(y, m+1, 0);
  // Start from Monday
  let startDow = firstDay.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1;

  const today = new Date();
  const todayStr = todayISO();

  // Previous month fill
  for(let i=0; i<startDow; i++){
    const d = new Date(y, m, -startDow+i+1);
    html += `<div class="cal-day other-month"><div class="cal-day-num">${d.getDate()}</div></div>`;
  }

  // Current month
  for(let day=1; day<=lastDay.getDate(); day++){
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const dayEvents = EVENTS.filter(e=>e.event_date===dateStr);
    const evHtml = dayEvents.slice(0,3).map(e=>`<div class="cal-event ${TYPE_COLORS[e.type]||'meeting'}" title="${e.title}">${e.event_time?e.event_time+' ':''} ${e.title}</div>`).join('');
    const more = dayEvents.length>3?`<div style="font-size:.65rem;color:var(--muted);margin-top:2px">+${dayEvents.length-3} more</div>`:'';
    html += `<div class="cal-day${isToday?' today':''}" onclick="openDay('${dateStr}')">
      <div class="cal-day-num">${day}</div>
      ${evHtml}${more}
    </div>`;
  }

  // Next month fill
  const totalCells = startDow + lastDay.getDate();
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for(let i=1; i<=remaining; i++){
    html += `<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;
  }

  grid.innerHTML = html;
}

function openDay(dateStr){
  selectedDay = dateStr;
  const d = new Date(dateStr);
  document.getElementById('day-modal-title').textContent = d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  const dayEvents = EVENTS.filter(e=>e.event_date===dateStr).sort((a,b)=>(a.event_time||'00:00').localeCompare(b.event_time||'00:00'));
  document.getElementById('day-modal-body').innerHTML = dayEvents.length ?
    dayEvents.map(ev=>`
      <div style="display:flex;align-items:flex-start;gap:12px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;background:var(--bg)">
        <div class="cal-event ${TYPE_COLORS[ev.type]||'meeting'}" style="flex-shrink:0;padding:4px 8px">${TYPE_LABELS[ev.type]||'Meeting'}</div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:.88rem">${ev.title}</div>
          ${ev.event_time?`<div style="font-size:.75rem;color:var(--muted)">🕐 ${ev.event_time}${ev.duration?` · ${ev.duration} min`:''}</div>`:''}
          ${ev.client?`<div style="font-size:.75rem;color:var(--muted)">👤 ${ev.client}</div>`:''}
          ${ev.location?`<div style="font-size:.75rem;color:var(--indigo)">${ev.location}</div>`:''}
        </div>
        <button class="btn btn-danger btn-icon btn-sm" onclick="deleteEvent('${ev.id}')">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
        </button>
      </div>`).join('') :
    `<div class="empty-state" style="padding:30px"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><h3>No events</h3><p>Click + Add to create one</p></div>`;
  openModal('modal-day');
}

function newEventOnDay(){
  closeModal('modal-day');
  document.getElementById('ev-date').value = selectedDay||todayISO();
  openModal('modal-event');
}

function renderUpcoming(){
  const q = (document.getElementById('search-ev')||{}).value||'';
  const now = todayISO();
  const upcoming = EVENTS
    .filter(e=>e.event_date>=now&&e.type!=='task'&&(!q||e.title.toLowerCase().includes(q.toLowerCase())))
    .sort((a,b)=>a.event_date.localeCompare(b.event_date)||((a.event_time||'').localeCompare(b.event_time||'')))
    .slice(0,10);

  document.getElementById('upcoming-list').innerHTML = upcoming.length ?
    upcoming.map(ev=>`
      <div style="display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--border)">
        <div class="cal-event ${TYPE_COLORS[ev.type]||'meeting'}" style="flex-shrink:0;font-size:.65rem;padding:3px 7px">${TYPE_LABELS[ev.type]?.split(' ')[0]}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ev.title}</div>
          <div style="font-size:.72rem;color:var(--muted)">${fmtDateShort(ev.event_date)} ${ev.event_time?'· '+ev.event_time:''}</div>
        </div>
      </div>`).join('') :
    '<div style="font-size:.8rem;color:var(--muted);text-align:center;padding:20px">No upcoming events</div>';
}

function renderTasks(){
  const tasks = EVENTS.filter(e=>e.type==='task').sort((a,b)=>a.event_date.localeCompare(b.event_date));
  document.getElementById('task-list').innerHTML = tasks.length ?
    tasks.map(t=>{
      const overdue = t.event_date < todayISO();
      return `<div style="display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--border)">
        <input type="checkbox" style="accent-color:var(--indigo);width:15px;height:15px" onchange="deleteEvent('${t.id}')">
        <div style="flex:1;min-width:0">
          <div style="font-size:.82rem;font-weight:500;${overdue?'color:var(--red);text-decoration:line-through':''}">${t.title}</div>
          <div style="font-size:.7rem;color:${overdue?'var(--red)':'var(--muted)'}">${fmtDateShort(t.event_date)}${overdue?' · Overdue':''}</div>
        </div>
      </div>`;
    }).join('') :
    '<div style="font-size:.8rem;color:var(--muted);text-align:center;padding:20px">No tasks</div>';
}

function renderUpcomingMini(){
  const now = todayISO();
  const upcoming = EVENTS.filter(e=>e.event_date>=now).sort((a,b)=>a.event_date.localeCompare(b.event_date)).slice(0,4);
  document.getElementById('upcoming-mini').innerHTML = upcoming.map(ev=>`
    <div style="padding:6px 10px;font-size:.76rem;color:var(--text2);border-radius:6px;display:flex;align-items:center;gap:6px;margin-bottom:2px">
      <span class="cal-event ${TYPE_COLORS[ev.type]||'meeting'}" style="font-size:.6rem;padding:2px 5px">${ev.type}</span>
      <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ev.title}</span>
    </div>`).join('') || '<div style="padding:6px 10px;font-size:.76rem;color:var(--muted)">No upcoming events</div>';
}

function openNewEvent(){ document.getElementById('ev-date').value=todayISO(); openModal('modal-event'); }
function prevMonth(){ currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); }
function nextMonth(){ currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); }
function goToday(){ currentDate=new Date(); renderCalendar(); }

async function saveEvent(){
  const user=getUser();
  const ev={
    user_id:user.id,
    title:document.getElementById('ev-title').value.trim(),
    event_date:document.getElementById('ev-date').value,
    event_time:document.getElementById('ev-time').value,
    type:document.getElementById('ev-type').value,
    duration:parseInt(document.getElementById('ev-duration').value)||0,
    client:document.getElementById('ev-client').value.trim(),
    location:document.getElementById('ev-location').value.trim(),
    description:document.getElementById('ev-desc').value.trim(),
    reminder:document.getElementById('ev-reminder').checked,
    created_at:new Date().toISOString(),
  };
  if(!ev.title||!ev.event_date){toast('Title and date are required','error');return;}
  try{ const saved=await api('events',{method:'POST',body:JSON.stringify(ev)}); EVENTS.push(Array.isArray(saved)?saved[0]:ev); }
  catch{ ev.id='local-'+Date.now(); EVENTS.push(ev); }
  toast('Event saved','success');
  closeModal('modal-event');
  ['ev-title','ev-client','ev-location','ev-desc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('ev-reminder').checked=false;
  renderCalendar(); renderUpcoming(); renderTasks(); renderUpcomingMini();
}

async function deleteEvent(id){
  EVENTS=EVENTS.filter(e=>e.id!==id);
  try{await api(`events?id=eq.${id}`,{method:'DELETE'});}catch{}
  toast('Removed','info');
  closeModal('modal-day');
  renderCalendar(); renderUpcoming(); renderTasks(); renderUpcomingMini();
}
</script>
