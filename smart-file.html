<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart File — Prospeo</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#003399;--brand-light:#EEF2FF;--bg:#F8FAFF;--white:#fff;--text:#0D1117;--text2:#374151;--text3:#6B7280;--border:#E5E7EB;--success:#059669;--warning:#D97706;--danger:#DC2626;--r:12px;--rlg:16px;--shadow:0 2px 12px rgba(0,0,0,.06)}
html{-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
header{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:var(--shadow)}
.header-logo img{height:22px}
.header-badge{font-size:11px;padding:4px 12px;background:var(--brand-light);color:var(--brand);border-radius:999px;font-weight:600}
.container{max-width:740px;margin:40px auto;padding:0 20px 80px}
/* Progress */
.progress-steps{display:flex;align-items:center;margin-bottom:32px}
.ps-step{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text3);flex:1}
.ps-step.done{color:var(--success)}.ps-step.active{color:var(--brand)}
.ps-circle{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:var(--white)}
.ps-step.done .ps-circle{background:var(--success);border-color:var(--success);color:#fff}
.ps-step.active .ps-circle{background:var(--brand);border-color:var(--brand);color:#fff}
.ps-line{flex:1;height:2px;background:var(--border);margin:0 8px}
.ps-step.done+.ps-line{background:var(--success)}
/* Document */
.doc-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:20px}
.doc-head{padding:28px 32px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px}
.doc-brand img{height:22px;margin-bottom:10px}
.doc-title{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.doc-ref{font-size:12px;color:var(--text3);margin-top:4px}
.doc-amount{text-align:right}
.doc-amount-val{font-size:36px;font-weight:700;color:var(--brand);letter-spacing:-1px}
.doc-amount-lbl{font-size:12px;color:var(--text3);margin-top:2px}
.doc-parties{padding:24px 32px;display:grid;grid-template-columns:1fr 1fr;gap:24px;border-bottom:1px solid var(--border)}
.party-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.party-name{font-size:15px;font-weight:600;color:var(--text)}
.party-detail{font-size:13px;color:var(--text3);line-height:1.6;margin-top:2px}
.doc-section{padding:24px 32px;border-bottom:1px solid var(--border)}
.doc-section:last-child{border-bottom:none}
.ds-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.line-table{width:100%;border-collapse:collapse}
.line-table th{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;padding:8px 12px;border-bottom:2px solid var(--text);text-align:left}
.line-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:14px;color:var(--text2)}
.line-table tr:last-child td{border-bottom:none}
.totals-block{background:var(--bg);border-radius:var(--r);padding:16px;margin-top:12px}
.tot-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text3);padding:4px 0}
.tot-row strong{color:var(--text)}
.tot-final{display:flex;justify-content:space-between;font-size:18px;font-weight:700;color:var(--text);padding-top:10px;margin-top:6px;border-top:2px solid var(--text)}
.tot-final span:last-child{color:var(--brand)}
.contract-text{font-size:13px;line-height:1.8;color:var(--text2);white-space:pre-wrap;font-family:-apple-system,sans-serif}
/* Signature */
.sig-box{border:2px dashed var(--border);border-radius:var(--r);overflow:hidden;position:relative;background:var(--white);cursor:crosshair}
.sig-box canvas{display:block;width:100%;touch-action:none}
.sig-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;color:var(--text3);pointer-events:none;text-align:center;line-height:1.5;transition:opacity .2s}
.sig-actions{display:flex;gap:8px;margin-top:10px;align-items:center}
.sig-clear{font-size:12px;color:var(--text3);background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer}
.sig-typed{font-family:'Georgia',serif;font-size:28px;color:var(--brand);padding:16px;min-height:70px;display:flex;align-items:center}
.sig-tab-row{display:flex;gap:4px;margin-bottom:10px}
.sig-tab{padding:5px 14px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--white);cursor:pointer;color:var(--text3)}
.sig-tab.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;text-decoration:none;transition:all .2s}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 2px 8px rgba(0,51,153,.2);width:100%;justify-content:center;padding:14px}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-primary:active{transform:scale(.97)}
.signed-banner{background:linear-gradient(135deg,#ECFDF5,#D1FAE5);border:1px solid #6EE7B7;border-radius:var(--rlg);padding:24px 28px;text-align:center;margin-bottom:20px}
.sb-icon{font-size:36px;margin-bottom:8px}
.sb-title{font-size:18px;font-weight:700;color:var(--success)}
.sb-sub{font-size:13px;color:#065F46;margin-top:4px}
.loading{text-align:center;padding:80px;color:var(--text3)}
.error-state{text-align:center;padding:80px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0D1117;color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:9999}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast-success{background:var(--success)}.toast-error{background:var(--danger)}
@media(max-width:600px){.doc-parties{grid-template-columns:1fr}.doc-head,.doc-parties,.doc-section{padding-left:20px;padding-right:20px}.container{padding:0 12px 60px}}
</style>
</head>
<body>
<header>
  <div class="header-logo"><img src="prospeo-logo.svg" alt="Prospeo"></div>
  <span class="header-badge">Smart File</span>
</header>
<div class="container">
  <div id="smart-file-content"><div class="loading">Loading your Smart File...</div></div>
</div>
<div class="toast" id="toast"></div>
<script>
var SUPA_URL='https://ferkzwzypmdtuypxribz.supabase.co';
var ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlcmt6d3p5cG1kdHV5cHhyaWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjY4MjksImV4cCI6MjA4OTI0MjgyOX0.KbRa1t0VqrdURT0xbWLUXOZrf462wLNZaUgljk7h6eg';
var _supa=supabase.createClient(SUPA_URL,ANON_KEY);
var _proposal=null, _sigMode='draw', _hasSig=false;
var _canvas=null, _ctx=null, _drawing=false, _lastX=0, _lastY=0;

function sanitize(s){var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}
function fmtEUR(n,sym){sym=sym||'€';return sym+parseFloat(n||0).toFixed(2);}
function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'')+ ' show';setTimeout(function(){t.className='toast';},3000);}

(async function(){
  var params=new URLSearchParams(window.location.search);
  var token=params.get('t');
  var el=document.getElementById('smart-file-content');
  if(!token){el.innerHTML='<div class="error-state"><div style="font-size:48px">🔗</div><h2 style="margin:16px 0 8px;color:var(--text)">Invalid link</h2><p style="color:var(--text3)">This Smart File link is invalid.</p></div>';return;}
  try{
    var {data:proposal,error}=await _supa.from('proposals').select('*').eq('share_token',token).single();
    if(error||!proposal)throw new Error('Smart File not found');
    _proposal=proposal;
    var sym={EUR:'€',GBP:'£',USD:'$'}[proposal.currency]||'€';
    var lines=[];
    try{lines=JSON.parse(proposal.line_items||'[]');}catch(e){lines=[];}
    var isSigned=proposal.status==='signed'||proposal.status==='paid';
    var signedBanner=isSigned?'<div class="signed-banner"><div class="sb-icon">✅</div><div class="sb-title">This Smart File has been signed</div><div class="sb-sub">Signed on '+new Date(proposal.signed_at||proposal.updated_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})+'</div></div>':'';
    var linesHTML=lines.map(function(l){return '<tr><td>'+sanitize(l.desc||'—')+'</td><td style="text-align:center">'+sanitize(l.qty||1)+'</td><td style="text-align:right">'+fmtEUR(l.price,sym)+'</td><td style="text-align:right;font-weight:600">'+fmtEUR((l.qty||1)*(l.price||0),sym)+'</td></tr>';}).join('');
    var tva=parseFloat(proposal.tva_rate||0);
    var ht=parseFloat(proposal.amount_ht||0);
    var ttc=parseFloat(proposal.amount_ttc||0);
    var tvaAmt=ttc-ht;
    var sigSection=isSigned?
      '<div style="background:#ECFDF5;border-radius:var(--r);padding:16px;text-align:center;color:var(--success);font-weight:600;font-size:14px">✓ Electronically signed · '+new Date(proposal.signed_at||proposal.updated_at).toLocaleString('fr-FR')+'</div>':
      '<div id="sig-section"><div class="sig-tab-row"><button class="sig-tab on" onclick="switchSigMode(\'draw\',this)">Draw signature</button><button class="sig-tab" onclick="switchSigMode(\'type\',this)">Type signature</button></div><div id="sig-draw"><div class="sig-box" id="sig-box" style="height:140px"><canvas id="sig-canvas" height="140"></canvas><div class="sig-hint" id="sig-hint">Sign here with your mouse or finger</div></div><div class="sig-actions"><button class="sig-clear" onclick="clearSig()">Clear</button><span style="font-size:12px;color:var(--text3);margin-left:auto">Your signature is legally binding under EU eIDAS regulation</span></div></div><div id="sig-type" style="display:none"><input id="sig-name-input" placeholder="Type your full name to sign" style="margin-bottom:8px;font-size:15px" oninput="updateTypedSig()"><div class="sig-typed" id="sig-typed-preview">Your name will appear here</div><div style="font-size:11px;color:var(--text3);margin-top:4px">Typing your name constitutes a valid electronic signature</div></div><button class="btn btn-primary" style="margin-top:16px" onclick="submitSignature()"><svg style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>I agree and sign this Smart File</button></div>';
    el.innerHTML=
      (isSigned?signedBanner:'')+
      '<div class="progress-steps">'+(isSigned?
        '<div class="ps-step done"><div class="ps-circle">✓</div>Proposal</div><div class="ps-line"></div><div class="ps-step done"><div class="ps-circle">✓</div>Contract</div><div class="ps-line"></div><div class="ps-step done"><div class="ps-circle">✓</div>Signed</div>':
        '<div class="ps-step done"><div class="ps-circle">✓</div>Proposal</div><div class="ps-line"></div><div class="ps-step done"><div class="ps-circle">✓</div>Review</div><div class="ps-line"></div><div class="ps-step active"><div class="ps-circle">3</div>Sign</div>'
      )+'</div>'+
      '<div class="doc-card">'+
        '<div class="doc-head">'+
          '<div><div class="doc-brand"><img src="prospeo-logo.svg" alt="Prospeo"></div><div class="doc-title">Smart File</div><div class="doc-ref">Ref: '+(proposal.id||'').slice(0,8).toUpperCase()+(proposal.valid_until?' · Valid until '+new Date(proposal.valid_until).toLocaleDateString('fr-FR'):'')+'</div></div>'+
          '<div class="doc-amount"><div class="doc-amount-val">'+fmtEUR(ttc,sym)+'</div><div class="doc-amount-lbl">Total TTC · '+tva+'% TVA</div></div>'+
        '</div>'+
        '<div class="doc-parties">'+
          '<div><div class="party-lbl">Project</div><div class="party-name">'+sanitize(proposal.project_title||'—')+'</div><div class="party-detail">'+sanitize(proposal.description||'')+'</div></div>'+
          '<div><div class="party-lbl">Client</div><div class="party-name">'+sanitize(proposal.client_name||'—')+'</div><div class="party-detail">'+sanitize(proposal.client_email||'')+(proposal.client_company?'<br>'+sanitize(proposal.client_company):'')+'</div></div>'+
        '</div>'+
        '<div class="doc-section">'+
          '<div class="ds-title">Services & Pricing</div>'+
          '<table class="line-table"><thead><tr><th>Description</th><th style="text-align:center">Qty</th><th style="text-align:right">Unit price</th><th style="text-align:right">Total HT</th></tr></thead><tbody>'+(linesHTML||'<tr><td colspan="4" style="color:var(--text3);text-align:center;padding:20px">No line items</td></tr>')+'</tbody></table>'+
          '<div class="totals-block"><div class="tot-row"><span>Subtotal HT</span><span><strong>'+fmtEUR(ht,sym)+'</strong></span></div><div class="tot-row"><span>TVA ('+tva+'%)</span><span><strong>'+fmtEUR(tvaAmt,sym)+'</strong></span></div><div class="tot-final"><span>Total TTC</span><span>'+fmtEUR(ttc,sym)+'</span></div></div>'+
        '</div>'+
        '<div class="doc-section">'+
          '<div class="ds-title">Contract Terms</div>'+
          '<div class="contract-text">'+sanitize(proposal.contract_terms||'No contract terms specified.')+'</div>'+
        '</div>'+
        '<div class="doc-section">'+
          '<div class="ds-title">Signature</div>'+
          sigSection+
        '</div>'+
      '</div>';
    if(!isSigned) initCanvas();
  }catch(e){
    el.innerHTML='<div class="error-state"><div style="font-size:48px">❌</div><h2 style="margin:16px 0 8px;color:var(--text)">Smart File not found</h2><p style="color:var(--text3)">'+sanitize(e.message||'This link may be invalid or expired.')+'</p></div>';
  }
})();

// ── SIGNATURE CANVAS ──────────────────────────────────────────
function initCanvas(){
  _canvas=document.getElementById('sig-canvas');
  if(!_canvas)return;
  var box=document.getElementById('sig-box');
  _canvas.width=box.offsetWidth||600;
  _ctx=_canvas.getContext('2d');
  _ctx.strokeStyle='#003399';_ctx.lineWidth=2.5;_ctx.lineCap='round';_ctx.lineJoin='round';
  function getPos(e){
    var rect=_canvas.getBoundingClientRect();
    var scaleX=_canvas.width/rect.width;
    var t=e.touches?e.touches[0]:e;
    return{x:(t.clientX-rect.left)*scaleX,y:(t.clientY-rect.top)*scaleX};
  }
  function startDraw(e){e.preventDefault();_drawing=true;var p=getPos(e);_lastX=p.x;_lastY=p.y;document.getElementById('sig-hint').style.opacity='0';}
  function draw(e){e.preventDefault();if(!_drawing)return;var p=getPos(e);_ctx.beginPath();_ctx.moveTo(_lastX,_lastY);_ctx.lineTo(p.x,p.y);_ctx.stroke();_lastX=p.x;_lastY=p.y;_hasSig=true;}
  function endDraw(){_drawing=false;}
  _canvas.addEventListener('mousedown',startDraw);
  _canvas.addEventListener('mousemove',draw);
  _canvas.addEventListener('mouseup',endDraw);
  _canvas.addEventListener('mouseleave',endDraw);
  _canvas.addEventListener('touchstart',startDraw,{passive:false});
  _canvas.addEventListener('touchmove',draw,{passive:false});
  _canvas.addEventListener('touchend',endDraw);
}

function clearSig(){if(!_ctx)return;_ctx.clearRect(0,0,_canvas.width,_canvas.height);_hasSig=false;document.getElementById('sig-hint').style.opacity='1';}
function switchSigMode(mode,el){_sigMode=mode;document.querySelectorAll('.sig-tab').forEach(function(b){b.classList.remove('on');});el.classList.add('on');document.getElementById('sig-draw').style.display=mode==='draw'?'block':'none';document.getElementById('sig-type').style.display=mode==='type'?'block':'none';}
function updateTypedSig(){var val=document.getElementById('sig-name-input').value;document.getElementById('sig-typed-preview').textContent=val||'Your name will appear here';_hasSig=val.trim().length>0;}

async function submitSignature(){
  var sigData='';
  if(_sigMode==='draw'){
    if(!_hasSig){toast('Please draw your signature first.','toast-error');return;}
    sigData=_canvas.toDataURL('image/png');
  }else{
    var name=(document.getElementById('sig-name-input').value||'').trim();
    if(!name){toast('Please type your full name to sign.','toast-error');return;}
    sigData='typed:'+name;
  }
  try{
    var {error}=await _supa.from('proposals').update({status:'signed',signature_data:sigData,signed_at:new Date().toISOString(),updated_at:new Date().toISOString()}).eq('share_token',new URLSearchParams(window.location.search).get('t'));
    if(error)throw error;
    document.getElementById('sig-section').innerHTML='<div style="background:#ECFDF5;border-radius:var(--r);padding:20px;text-align:center"><div style="font-size:32px;margin-bottom:8px">✅</div><div style="font-size:16px;font-weight:700;color:var(--success);margin-bottom:4px">Signed successfully!</div><div style="font-size:13px;color:#065F46">Thank you. Your signature has been recorded. A copy will be sent to your email.</div></div>';
    document.querySelector('.progress-steps').innerHTML='<div class="ps-step done"><div class="ps-circle">✓</div>Proposal</div><div class="ps-line"></div><div class="ps-step done"><div class="ps-circle">✓</div>Contract</div><div class="ps-line"></div><div class="ps-step done"><div class="ps-circle">✓</div>Signed</div>';
    toast('Signed successfully!','toast-success');
    // Trigger automation: proposal signed → create invoice
    var edgeBase='https://ferkzwzypmdtuypxribz.supabase.co/functions/v1';
    fetch(edgeBase+'/automation-engine',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlcmt6d3p5cG1kdHV5cHhyaWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjY4MjksImV4cCI6MjA4OTI0MjgyOX0.KbRa1t0VqrdURT0xbWLUXOZrf462wLNZaUgljk7h6eg'},
      body:JSON.stringify({trigger:'proposal.signed',payload:{proposal_id:_proposal.id}})
    }).then(function(r){return r.json();}).then(function(d){
      if(d.ok&&d.action==='invoice_created'){
        var note=document.createElement('div');
        note.style.cssText='margin-top:12px;background:#ECFDF5;border-radius:8px;padding:12px;font-size:13px;color:#059669;text-align:center';
        note.textContent='Invoice automatically created and sent to '+_proposal.client_email;
        var sigSec=document.getElementById('sig-section');
        if(sigSec)sigSec.appendChild(note);
      }
    }).catch(function(){});
  }catch(e){toast('Signing failed: '+(e.message||'please try again'),'toast-error');}
}
</script>
</body>
</html>
